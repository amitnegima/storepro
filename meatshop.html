<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#8b1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StorePro">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<title>Fresh Meat — StorePro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Noto+Sans+Devanagari:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --R:#8b1a1a;--R2:#c62828;--R3:#ef5350;--Rbg:#fff5f5;--Rlt:#ffcdd2;
  --G:#2e7d32;--Gbg:#e8f5e9;
  --T1:#1a1a1a;--T2:#555;--T3:#999;--T4:#ccc;
  --BG:#f4f4f4;--W:#fff;--LINE:#ebebeb;
  --F:'DM Sans',system-ui,sans-serif;--FH:'Noto Sans Devanagari',sans-serif;
  --MW:460px;--PX:16px;--RAD:14px;
  --EASE:cubic-bezier(.25,.8,.25,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--F);background:var(--BG);color:var(--T1);-webkit-font-smoothing:antialiased}

/* === HEADER === */
.hdr{position:sticky;top:0;z-index:100;background:var(--R);max-width:var(--MW);margin:0 auto}
.hdr-top{display:flex;align-items:center;padding:12px var(--PX);gap:12px;color:#fff}
.hdr-back{width:34px;height:34px;background:rgba(255,255,255,.12);border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer;display:grid;place-items:center}
.hdr-info{flex:1}
.hdr-name{font-size:16px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.65;margin-top:1px}
.hdr-cart{width:40px;height:40px;background:rgba(255,255,255,.12);border:none;border-radius:12px;color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;position:relative}
.hdr-cart:active{transform:scale(.9)}
.badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;background:#ffab00;color:#000;font:700 9px var(--F);border-radius:8px;display:none;place-items:center;padding:0 4px}

/* === BANNER === */
.banner{max-width:var(--MW);margin:0 auto;padding:10px var(--PX);background:linear-gradient(135deg,var(--R),#a02020);display:none;gap:8px;align-items:center;color:#fff}
.banner.show{display:flex}
.banner-text{flex:1;font:600 12px var(--F)}
.banner-btns{display:flex;gap:6px}
.banner-btn{height:34px;padding:0 14px;border:none;border-radius:10px;font:700 12px var(--F);cursor:pointer;display:inline-flex;align-items:center;gap:5px;color:#fff}
.banner-btn:active{opacity:.8}
.b-green{background:#25d366}
.b-white{background:rgba(255,255,255,.2)}

/* === SEARCH === */
.srch{max-width:var(--MW);margin:0 auto;padding:10px var(--PX);background:var(--W)}
.srch-box{position:relative}
.srch-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.srch-input{width:100%;height:48px;padding:0 42px;border:none;border-radius:var(--RAD);font:500 15px var(--F);background:var(--BG);outline:none;color:var(--T1)}
.srch-input:focus{box-shadow:inset 0 0 0 2px var(--R2)}
.srch-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border:none;background:var(--LINE);border-radius:50%;font-size:13px;cursor:pointer;display:none;place-items:center;color:var(--T3)}

/* === PRODUCT LIST === */
.list{max-width:var(--MW);margin:0 auto;padding:6px var(--PX) 140px}
.sec-title{font:700 13px var(--F);color:var(--T3);text-transform:uppercase;letter-spacing:.08em;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--LINE)}

/* === PRODUCT CARD === */
.item{background:var(--W);border-radius:var(--RAD);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .15s var(--EASE)}
.item:active{transform:scale(.98)}

.item-main{display:flex;padding:14px}
.item-left{flex:1;min-width:0;padding-right:12px}
.item-emoji{width:42px;height:42px;background:var(--Rbg);border-radius:10px;display:grid;place-items:center;font-size:22px;margin-bottom:8px}
.item-name{font:700 15px var(--F);color:var(--T1);line-height:1.25}
.item-hindi{font:500 12px var(--FH);color:var(--T3);margin-top:1px}
.item-desc{font:400 12px var(--F);color:var(--T3);line-height:1.4;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-tags{display:flex;gap:4px;margin-top:6px}
.tag{font:600 10px var(--F);padding:3px 8px;border-radius:6px}
.tag-fresh{background:var(--Gbg);color:var(--G)}
.tag-pop{background:#fff8e1;color:#f57f17}
.tag-def{background:var(--BG);color:var(--T3)}

.item-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0;min-width:70px}
.item-price{font:800 18px var(--F);color:var(--R)}
.item-unit{font:500 10px var(--F);color:var(--T4)}
.item-askprice{font:600 11px var(--F);color:var(--R);text-align:center;line-height:1.3}

/* === QTY SELECTOR === */
.item-footer{padding:0 14px 14px}
.qty-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.qty-presets{display:flex;gap:4px}
.qp{flex:1;height:40px;border:1.5px solid var(--LINE);border-radius:10px;background:var(--W);font:600 13px var(--F);color:var(--T2);cursor:pointer;display:grid;place-items:center;transition:.15s}
.qp:active{transform:scale(.94)}
.qp.on{background:var(--R);color:#fff;border-color:var(--R);font-weight:700}
.qty-custom{display:flex;gap:6px;align-items:center}
.qty-custom-label{font:500 11px var(--F);color:var(--T3);white-space:nowrap}
.qty-custom input{flex:1;height:40px;border:1.5px solid var(--LINE);border-radius:10px;font:600 15px var(--F);text-align:center;outline:none;background:var(--W);color:var(--T1);min-width:0}
.qty-custom input:focus{border-color:var(--R);box-shadow:0 0 0 3px rgba(139,26,26,.08)}
.qty-unit-toggle{display:flex;border:1.5px solid var(--LINE);border-radius:10px;overflow:hidden;flex-shrink:0}
.qu-btn{height:40px;padding:0 14px;border:none;font:600 13px var(--F);cursor:pointer;background:var(--W);color:var(--T2);transition:.15s}
.qu-btn.on{background:var(--R);color:#fff}
.qu-btn:first-child{border-right:1px solid var(--LINE)}

/* ADD BUTTON */
.add-btn{width:100%;height:52px;border:none;border-radius:12px;font:700 15px var(--F);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s var(--EASE);color:var(--R);background:var(--Rbg);border:2px solid var(--Rlt)}
.add-btn:active{transform:scale(.96)}
.add-btn.done{background:var(--G);color:#fff;border-color:var(--G)}

/* === CART BAR === */
.cbar{position:fixed;bottom:0;left:0;right:0;z-index:90;transform:translateY(100%);transition:.35s var(--EASE);pointer-events:none}
.cbar.show{transform:translateY(0);pointer-events:auto}
.cbar-inner{max-width:var(--MW);margin:0 auto;padding:0 10px calc(6px + env(safe-area-inset-bottom))}
.cbar-card{background:var(--R);color:#fff;border-radius:16px 16px 0 0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,.15);cursor:pointer}
.cbar-card:active{opacity:.9}
.cbar-left{display:flex;align-items:center;gap:10px}
.cbar-n{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:8px;display:grid;place-items:center;font:800 14px var(--F)}
.cbar-t{font:500 13px var(--F);opacity:.9}
.cbar-cta{font:700 13px var(--F);background:rgba(255,255,255,.18);padding:8px 16px;border-radius:20px}

/* === CART DRAWER === */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;max-width:var(--MW);margin:0 auto;background:var(--W);border-radius:20px 20px 0 0;z-index:201;max-height:90vh;display:flex;flex-direction:column;transform:translateY(100%);transition:.4s var(--EASE)}
.drawer.open{transform:translateY(0)}
.drawer-knob{width:32px;height:4px;background:var(--LINE);border-radius:2px;margin:8px auto 0}
.drawer-hdr{padding:10px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--LINE)}
.drawer-title{font:700 17px var(--F)}
.drawer-close{width:34px;height:34px;border:none;background:var(--BG);border-radius:10px;font-size:15px;cursor:pointer;display:grid;place-items:center;color:var(--T3)}
.drawer-body{flex:1;overflow-y:auto;padding:8px 20px;-webkit-overflow-scrolling:touch}

/* Cart item */
.ci{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--LINE)}
.ci:last-child{border-bottom:none}
.ci-em{width:40px;height:40px;background:var(--Rbg);border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
.ci-info{flex:1}
.ci-name{font:600 14px var(--F);color:var(--T1)}
.ci-meta{font:500 12px var(--F);color:var(--T3);margin-top:2px}
.ci-price{font:700 12px var(--F);color:var(--R);margin-top:1px}
.ci-del{width:32px;height:32px;border:none;background:var(--Rbg);color:var(--R);border-radius:8px;font-size:13px;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
.ci-del:active{background:var(--R);color:#fff}

/* Drawer footer */
.drawer-ft{padding:16px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--LINE)}
.df-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.df-count{font:700 15px var(--F)}
.df-price{font:800 16px var(--F);color:var(--R)}
.df-note{font:400 11px var(--F);color:var(--T3);text-align:center;margin-bottom:14px;font-style:italic}
.df-btns{display:flex;flex-direction:column;gap:10px}
.df-btn{height:56px;border:none;border-radius:14px;font:700 16px var(--F);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.15s}
.df-btn:active{transform:scale(.97)}
.df-wa{background:#25d366;color:#fff;box-shadow:0 4px 14px rgba(37,211,102,.25)}
.df-call{background:var(--R);color:#fff;box-shadow:0 4px 14px rgba(139,26,26,.2)}
.df-icon{font-size:22px}

/* === CHECKOUT SCREEN (inside drawer) === */
.co{padding:0 20px 20px}
.co-title{font:700 15px var(--F);color:var(--T1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.co-section{margin-bottom:16px}
.co-label{font:600 11px var(--F);color:var(--T3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.co-input{width:100%;height:48px;padding:0 14px;border:2px solid var(--LINE);border-radius:12px;font:500 15px var(--F);outline:none;color:var(--T1);background:var(--BG);margin-bottom:8px;transition:.2s}
.co-input:focus{border-color:var(--R);background:var(--W);box-shadow:0 0 0 3px rgba(139,26,26,.08)}
.co-input::placeholder{color:var(--T4)}
.co-textarea{width:100%;min-height:72px;padding:12px 14px;border:2px solid var(--LINE);border-radius:12px;font:500 14px var(--F);outline:none;color:var(--T1);background:var(--BG);resize:vertical;line-height:1.5;margin-bottom:8px;transition:.2s}
.co-textarea:focus{border-color:var(--R);background:var(--W);box-shadow:0 0 0 3px rgba(139,26,26,.08)}
.co-textarea::placeholder{color:var(--T4)}
.co-gps{height:42px;border:none;border-radius:10px;font:600 13px var(--F);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--R);background:var(--Rbg);width:100%;margin-bottom:8px;transition:.15s}
.co-gps:active{transform:scale(.97)}
.co-gps.loading{opacity:.6;pointer-events:none}
.co-mode{display:flex;gap:6px;margin-bottom:8px}
.co-mode-btn{flex:1;height:46px;border:2px solid var(--LINE);border-radius:12px;font:600 13px var(--F);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--T2);background:var(--W);transition:.15s}
.co-mode-btn:active{transform:scale(.96)}
.co-mode-btn.active{border-color:var(--R);background:var(--Rbg);color:var(--R)}
.co-note-input{width:100%;height:44px;padding:0 14px;border:2px solid var(--LINE);border-radius:12px;font:500 13px var(--F);outline:none;color:var(--T1);background:var(--BG);transition:.2s}
.co-note-input:focus{border-color:var(--R);background:var(--W)}
.co-note-input::placeholder{color:var(--T4)}

/* Items summary in checkout */
.co-items{background:var(--BG);border-radius:12px;padding:12px;margin-bottom:16px}
.co-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font:500 13px var(--F);color:var(--T2)}
.co-item:not(:last-child){border-bottom:1px solid var(--LINE)}
.co-item-name{flex:1}
.co-item-qty{color:var(--T3);flex-shrink:0;margin-left:8px}

.co-error{font:600 12px var(--F);color:var(--R2);background:var(--Rbg);padding:10px 14px;border-radius:10px;margin-bottom:10px;display:none;align-items:center;gap:6px}

/* Toggle bar */
.tbar{max-width:var(--MW);margin:0 auto;padding:10px var(--PX);background:var(--W);border-bottom:1px solid var(--LINE);display:none;align-items:center;justify-content:space-between;position:sticky;top:58px;z-index:90}
.tbar.show{display:flex}
.tbar-info{font:600 12px var(--F);color:var(--T2)}
.tbar-hint{font:400 10px var(--F);color:var(--T4);margin-top:1px}
.sw{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0}
.sw input{display:none}
.sw-track{position:absolute;inset:0;background:var(--LINE);border-radius:13px;transition:.3s}
.sw input:checked+.sw-track{background:var(--R)}
.sw-dot{position:absolute;top:2px;left:2px;width:22px;height:22px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:.3s}
.sw input:checked~.sw-dot{left:20px}

/* WA float */
.waf{position:fixed;bottom:20px;right:14px;width:52px;height:52px;background:#25d366;border-radius:14px;display:none;place-items:center;box-shadow:0 4px 16px rgba(37,211,102,.3);z-index:80;cursor:pointer;text-decoration:none;font-size:24px;transition:.3s}
.waf:active{transform:scale(.88)}
.waf.up{bottom:96px}

/* Footer */
.ft{max-width:var(--MW);margin:0 auto;padding:24px var(--PX) 100px;text-align:center}
.ft-name{font:700 14px var(--F);color:var(--T1)}
.ft-addr{font:400 11px var(--F);color:var(--T3);margin-top:4px;line-height:1.5}
.ft-line{width:30px;height:2px;background:var(--LINE);margin:14px auto}
.ft-pw{font:500 10px var(--F);color:var(--T4)}.ft-pw b{color:var(--R)}

/* === INSTALL BANNER === */
.install-bar{position:fixed;bottom:0;left:0;right:0;max-width:var(--MW);margin:0 auto;background:var(--W);border-top:1px solid var(--LINE);padding:12px var(--PX) calc(12px + env(safe-area-inset-bottom));display:none;align-items:center;justify-content:space-between;gap:10px;z-index:88;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.install-bar.show{display:flex}
.install-text{font:500 12px var(--F);color:var(--T2);flex:1}
.install-text strong{color:var(--T1);font-weight:700}
.install-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.install-btn{height:38px;padding:0 20px;border:none;border-radius:10px;background:var(--R);color:#fff;font:700 13px var(--F);cursor:pointer}
.install-btn:active{transform:scale(.95)}
.install-x{width:30px;height:30px;border:none;background:var(--BG);border-radius:8px;font-size:14px;cursor:pointer;color:var(--T3);display:grid;place-items:center}

/* Shimmer */
.shim{background:linear-gradient(90deg,var(--LINE) 25%,#f5f5f5 50%,var(--LINE) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:var(--RAD)}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:48px 20px;color:var(--T3)}
.empty b{display:block;font-size:44px;margin-bottom:10px}
.empty span{font:600 15px var(--F)}

@media(min-width:461px){body{background:#e8e0da}.hdr,.banner,.srch,.list,.ft,.tbar{border-left:1px solid #ddd;border-right:1px solid #ddd}}
@media(max-width:460px){
  .qp{height:44px;font-size:14px;border-radius:10px}
  .qty-custom input{height:44px;font-size:16px}
  .qu-btn{height:44px;padding:0 12px;font-size:14px}
  .add-btn{height:56px;font-size:16px}
  .srch-input{height:50px;font-size:16px}
  .df-btn{height:60px;font-size:17px}
  .df-icon{font-size:24px}
  .co-input{height:50px;font-size:16px}
  .co-textarea{min-height:80px;font-size:15px}
  .co-mode-btn{height:50px;font-size:14px}
  .co-gps{height:46px;font-size:14px}
}
</style>
</head>
<body>

<div class="hdr"><div class="hdr-top">
  <button class="hdr-back" onclick="history.back()">←</button>
  <div class="hdr-info"><div class="hdr-name" id="shopName">Loading...</div><div class="hdr-sub" id="shopStatus">Fresh meat daily</div></div>
  <button class="hdr-cart" onclick="openDr()">🛒<span class="badge" id="badge">0</span></button>
</div></div>

<div class="banner" id="banner">
  <div class="banner-text" id="bannerText">📞 Call for today's price & availability</div>
  <div class="banner-btns" id="bannerBtns"></div>
</div>

<div class="tbar" id="tbar">
  <div><div class="tbar-info">💰 Show Prices</div><div class="tbar-hint" id="tbarHint">Prices may change daily</div></div>
  <label class="sw"><input type="checkbox" id="swPrice" onchange="SP=this.checked;render()"><span class="sw-track"></span><span class="sw-dot"></span></label>
</div>

<div class="srch">
  <div class="srch-box">
    <input class="srch-input" id="si" placeholder="Search chicken, mutton, fish..." oninput="render();$('sx').style.display=this.value?'grid':'none'">
    <button class="srch-x" id="sx" onclick="$('si').value='';render();this.style.display='none'">✕</button>
  </div>
</div>

<div class="list" id="list">
  <div id="shim"><div class="shim" style="height:180px;margin-bottom:10px"></div><div class="shim" style="height:180px;margin-bottom:10px"></div><div class="shim" style="height:180px"></div></div>
</div>

<div class="ft"><div class="ft-name" id="ftName"></div><div class="ft-addr" id="ftAddr"></div><div class="ft-line"></div><div class="ft-pw">Powered by <b>StorePro</b></div><div style="font:400 9px var(--F);color:var(--T4);margin-top:6px">v1.0.0.1</div></div>

<!-- Install App Banner -->
<div class="install-bar" id="installBar">
  <div class="install-text">📲 <strong>Install App</strong> — add to home screen for quick access</div>
  <div class="install-btns">
    <button class="install-btn" id="installBtn" onclick="installApp()">Install</button>
    <button class="install-x" onclick="$('installBar').style.display='none'">✕</button>
  </div>
</div>

<a href="#" id="waf" class="waf">💬</a>

<div class="cbar" id="cbar"><div class="cbar-inner"><div class="cbar-card" onclick="openDr()">
  <div class="cbar-left"><div class="cbar-n" id="cn">0</div><div class="cbar-t"><span id="ct">0 items</span> added</div></div>
  <div class="cbar-cta">View Cart →</div>
</div></div></div>

<div class="overlay" id="ov" onclick="closeDr()"></div>
<div class="drawer" id="dr">
  <div class="drawer-knob"></div>
  <div class="drawer-hdr"><div class="drawer-title" id="drawer-title2">Your Order</div><button class="drawer-close" onclick="closeDr()">✕</button></div>
  <div class="drawer-body" id="db"></div>
  <div class="drawer-ft" id="dft"></div>
</div>

<script>
var $=function(id){return document.getElementById(id)};
function E(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

var SID='',SU='',MID='1K6jYaOrnmMLw_0_N5EvrgE5jEOpbIsWZjyCM8Yf6OLg';
var C={},SP=false,items=[],cart=[];
var QL={kg:100,g:1000};

function LS(name,cb){if(!SID){cb(null);return}if(!window.google)window.google={};if(!window.google.visualization)window.google.visualization={};if(!window.google.visualization.Query)window.google.visualization.Query={};window.google.visualization.Query.setResponse=function(r){cb(r)};var s=document.createElement('script');s.src='https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(name)+'&_t='+Date.now();s.onerror=function(){cb(null)};document.body.appendChild(s)}
function G(k,d){var n=k.toLowerCase().replace(/\s+/g,'');for(var c in C){if(c.toLowerCase().replace(/\s+/g,'')===n)return C[c]||d}return d||''}

function init(){
  var p=new URLSearchParams(location.search),slug=p.get('store')||p.get('shop')||'',sh=p.get('sheet')||'';
  if(sh){SID=sh;loadCfg(function(){loadProd()})}
  else if(slug){lookup(slug,function(){loadCfg(function(){loadProd()})})}
  else err('No store specified','Add ?store=name to the URL');
}
function err(t,m){$('shim').style.display='none';$('list').innerHTML='<div class="empty"><b>🏬</b><span>'+E(t)+'</span><div style="font-size:12px;color:var(--T4);margin-top:6px">'+E(m)+'</div></div>'}

function lookup(slug,cb){
  if(!window.google)window.google={};if(!window.google.visualization)window.google.visualization={};if(!window.google.visualization.Query)window.google.visualization.Query={};
  window.google.visualization.Query.setResponse=function(r){if(!r||!r.table||!r.table.rows){err('Store not found','"'+slug+'" does not exist');return}var cols=r.table.cols||[];r.table.rows.forEach(function(row){var o={};cols.forEach(function(c,i){var cl=row.c&&row.c[i];o[c.label.toLowerCase().replace(/\s+/g,'')]=cl?(cl.f!=null?String(cl.f):cl.v!=null?String(cl.v):''):''});if((o.slug||'').toLowerCase()===slug.toLowerCase()){SID=o.sheetid||'';SU=o.scripturl||o.script||''}});if(SID)cb();else err('Store not found','"'+slug+'" is not active')};
  var s=document.createElement('script');s.src='https://docs.google.com/spreadsheets/d/'+MID+'/gviz/tq?tqx=out:json&sheet=Stores&_t='+Date.now();s.onerror=function(){err('Connection error','Cannot reach registry')};document.body.appendChild(s);
}

function loadCfg(cb){LS('Config',function(r){if(r&&r.table&&r.table.rows)r.table.rows.forEach(function(row){var a=row.c&&row.c[0],b=row.c&&row.c[1],k='',v='';if(a){k=a.f!=null?String(a.f).trim():a.v!=null?String(a.v).trim():''}if(b){v=b.f!=null?String(b.f).trim():b.v!=null?String(b.v).trim():''}if(k&&k.toLowerCase()!=='key')C[k]=v});applyCfg();cb()})}

function applyCfg(){
  var n=G('shopname','Fresh Meat Shop');
  $('shopName').textContent=n;$('ftName').textContent=n;$('ftAddr').textContent=G('address','');
  var sp=G('showprices','no');SP=(sp.toLowerCase()==='yes'||sp==='1');
  if(SP){$('swPrice').checked=true;$('tbar').classList.add('show');var h=G('pricenote','');if(h)$('tbarHint').textContent=h}
  // Banner
  var wa=G('whatsapp','')||G('phone',''),ph=G('phone','');
  if(ph||wa){
    var b='';
    if(ph)b+='<button class="banner-btn b-white" onclick="location.href=\'tel:+'+String(ph).replace(/\D/g,'')+'\'">📞 Call</button>';
    if(wa)b+='<button class="banner-btn b-green" onclick="window.open(\'https://wa.me/'+String(wa).replace(/\D/g,'')+'\',\'_blank\')">💬 Chat</button>';
    $('bannerBtns').innerHTML=b;$('banner').classList.add('show');
  }
  if(wa){$('waf').href='https://wa.me/'+String(wa).replace(/\D/g,'')+'?text='+encodeURIComponent('Hi! I want to order from '+n);$('waf').style.display='grid'}
}

function loadProd(){LS('Products',function(r){
  items=[];if(!r||!r.table||!r.table.rows){err('No products','Check Products tab');return}
  var hd=[],ds=0;if(r.table.cols)r.table.cols.forEach(function(c){hd.push((c.label||'').toLowerCase().replace(/\s+/g,''))});
  if(hd.every(function(h){return !h})&&r.table.rows.length>0){hd=[];var fr=r.table.rows[0];if(fr.c)fr.c.forEach(function(cl){var v='';if(cl){v=cl.f!=null?String(cl.f):cl.v!=null?String(cl.v):''}hd.push(v.toLowerCase().replace(/\s+/g,''))});ds=1}
  for(var i=ds;i<r.table.rows.length;i++){var row=r.table.rows[i];if(!row.c)continue;var o={};row.c.forEach(function(cl,ci){if(ci>=hd.length)return;var k=hd[ci];if(!k)return;var v='';if(cl){v=cl.f!=null?String(cl.f):cl.v!=null?String(cl.v):''}o[k]=v});
  if(o.name)items.push({name:o.name,hi:o.hindiname||o.hindi||'',cat:o.category||'Meat',price:parseFloat(o.price)||0,unit:o.unit||'per kg',em:o.emoji||'🥩',desc:o.description||o.desc||'',tags:o.tags||'',stock:o.stock||'in stock'})}
  if(!items.length){$('shim').style.display='none';err('No products found','Add items to Products tab');return}
  $('shim').style.display='none';render();
})}

function render(){
  var q=($('si').value||'').toLowerCase();
  var f=items.filter(function(x){return !q||(x.name+x.hi+x.cat+x.desc).toLowerCase().indexOf(q)>=0});
  if(!f.length){$('list').innerHTML='<div class="empty"><b>🔍</b><span>Nothing found</span></div>';return}
  var grp={};f.forEach(function(x){if(!grp[x.cat])grp[x.cat]=[];grp[x.cat].push(x)});
  var h='';
  for(var cat in grp){
    h+='<div class="sec-title">'+catEm(cat)+' '+E(cat)+' ('+grp[cat].length+')</div>';
    grp[cat].forEach(function(x){
      var id=x.name.replace(/[^a-zA-Z0-9]/g,'-');
      var ic=cart.find(function(c){return c.name===x.name});
      var tg=(x.tags||'').split('|').filter(function(t){return t.trim()});
      h+='<div class="item"><div class="item-main"><div class="item-left">';
      h+='<div class="item-emoji">'+x.em+'</div>';
      h+='<div class="item-name">'+E(x.name)+'</div>';
      if(x.hi)h+='<div class="item-hindi">'+E(x.hi)+'</div>';
      if(x.desc)h+='<div class="item-desc">'+E(x.desc)+'</div>';
      if(tg.length){h+='<div class="item-tags">';tg.forEach(function(t){t=t.trim();var c='tag tag-def';if('Fresh Daily Healthy'.indexOf(t)>=0)c='tag tag-fresh';if('Popular Bestseller Premium Party'.indexOf(t)>=0)c='tag tag-pop';h+='<span class="'+c+'">'+E(t)+'</span>'});h+='</div>'}
      h+='</div><div class="item-right">';
      if(SP&&x.price>0)h+='<div class="item-price">₹'+x.price+'</div><div class="item-unit">'+E(x.unit)+'</div>';
      else h+='<div class="item-askprice">📞 Ask<br>price</div>';
      h+='</div></div>';
      // Footer
      h+='<div class="item-footer"><div class="qty-wrap">';
      h+='<div class="qty-presets">';
      h+='<div class="qp" onclick="qp(this,\''+id+'\',250,\'g\')">250g</div>';
      h+='<div class="qp" onclick="qp(this,\''+id+'\',500,\'g\')">500g</div>';
      h+='<div class="qp on" onclick="qp(this,\''+id+'\',1,\'kg\')">1 kg</div>';
      h+='<div class="qp" onclick="qp(this,\''+id+'\',2,\'kg\')">2 kg</div>';
      h+='</div>';
      h+='<div class="qty-custom">';
      h+='<div class="qty-custom-label">or enter:</div>';
      h+='<input id="q-'+id+'" type="number" value="1" step="0.1" min="0.1" max="100" onchange="el(\''+id+'\')" onfocus="clearPresets(\''+id+'\')">';
      h+='<div class="qty-unit-toggle"><button class="qu-btn" id="ug-'+id+'" onclick="setU(\''+id+'\',\'g\',this)">gram</button><button class="qu-btn on" id="uk-'+id+'" onclick="setU(\''+id+'\',\'kg\',this)">kg</button></div>';
      h+='<input type="hidden" id="u-'+id+'" value="kg">';
      h+='</div></div>';
      h+='<button class="add-btn'+(ic?' done':'')+'" id="b-'+id+'" onclick="add(\''+E(x.name).replace(/'/g,"\\'")+'\',\''+x.em+'\','+x.price+',\''+id+'\')">'+(ic?'✓ Added':'🛒 Add to Cart')+'</button>';
      h+='</div></div>';
    });
  }
  $('list').innerHTML=h;
}

function catEm(c){c=c.toLowerCase();if(c.indexOf('chicken')>=0)return '🍗';if(c.indexOf('mutton')>=0||c.indexOf('goat')>=0)return '🥩';if(c.indexOf('fish')>=0)return '🐟';if(c.indexOf('egg')>=0)return '🥚';return '🥩'}

function qp(el,id,v,u){el.parentElement.querySelectorAll('.qp').forEach(function(p){p.classList.remove('on')});el.classList.add('on');$('q-'+id).value=v;$('u-'+id).value=u;
  // Update unit toggle buttons
  var ug=$('ug-'+id),uk=$('uk-'+id);
  if(ug&&uk){if(u==='g'){ug.classList.add('on');uk.classList.remove('on')}else{uk.classList.add('on');ug.classList.remove('on')}}
  if(u==='g'){$('q-'+id).max=1000;$('q-'+id).step=50;$('q-'+id).min=50}else{$('q-'+id).max=100;$('q-'+id).step=0.1;$('q-'+id).min=0.1}
}
function setU(id,u,btn){
  $('u-'+id).value=u;
  btn.parentElement.querySelectorAll('.qu-btn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');
  var inp=$('q-'+id);
  if(u==='g'){inp.max=1000;inp.step=50;inp.min=50;if(parseFloat(inp.value)<50)inp.value=250}
  else{inp.max=100;inp.step=0.1;inp.min=0.1;if(parseFloat(inp.value)>100)inp.value=1}
  // Clear presets
  inp.closest('.qty-wrap').querySelectorAll('.qp').forEach(function(p){p.classList.remove('on')});
}
function clearPresets(id){
  var wrap=$('q-'+id).closest('.qty-wrap');
  if(wrap)wrap.querySelectorAll('.qp').forEach(function(p){p.classList.remove('on')});
}
function el(id){var inp=$('q-'+id),u=$('u-'+id).value,mx=QL[u]||1000,v=parseFloat(inp.value);if(v>mx)inp.value=mx;if(v<=0)inp.value=inp.min||1}

function add(name,em,price,id){
  var v=parseFloat($('q-'+id).value),u=$('u-'+id).value;if(!v||v<=0){v=1;u='kg'}
  var mx=QL[u]||1000;if(v>mx){$('q-'+id).value=mx;alert('Max '+mx+' '+u);return}
  var ql=v+' '+u,ex=cart.find(function(c){return c.name===name&&c.ql===ql});
  if(ex)ex.n++;else cart.push({name:name,em:em,price:price,qv:v,qu:u,ql:ql,n:1});
  var b=$('b-'+id);if(b){b.classList.add('done');b.textContent='✓ Added';setTimeout(function(){b.classList.remove('done');b.textContent='🛒 Add to Cart'},1200)}
  updBar();
}
function rem(i){cart.splice(i,1);updBar();renDr();if(!cart.length)closeDr()}
function updBar(){
  var n=cart.reduce(function(s,c){return s+c.n},0),b=$('cbar'),bg=$('badge');
  if(!n){b.classList.remove('show');bg.style.display='none';var w=$('waf');if(w)w.classList.remove('up');return}
  b.classList.add('show');bg.style.display='grid';bg.textContent=n;$('cn').textContent=n;$('ct').textContent=n+' item'+(n>1?'s':'');
  var w=$('waf');if(w)w.classList.add('up');
}

function openDr(){drStep='cart';renDr();$('ov').classList.add('open');$('dr').classList.add('open')}
function closeDr(){$('ov').classList.remove('open');$('dr').classList.remove('open')}
var savedCust=JSON.parse(localStorage.getItem('sp_meat_cust')||'{}');
var orderMode=savedCust.mode||'delivery';

function renDr(){
  if(drStep==='checkout'){renCheckout();return}
  $('drawer-title2').textContent='Your Order';
  if(!cart.length){$('db').innerHTML='<div style="text-align:center;padding:48px 20px"><div style="font-size:64px;margin-bottom:14px">🛒</div><div style="font:700 17px var(--F);color:var(--T1);margin-bottom:6px">Your cart is empty</div><div style="font:400 13px var(--F);color:var(--T3);line-height:1.5">Browse the menu and add items<br>to start your order</div><button onclick="closeDr()" style="margin-top:20px;height:46px;padding:0 28px;border:none;border-radius:12px;background:var(--R);color:#fff;font:700 14px var(--F);cursor:pointer">🥩 Browse Menu</button></div>';$('dft').innerHTML='';return}
  var h='';cart.forEach(function(c,i){h+='<div class="ci"><div class="ci-em">'+c.em+'</div><div class="ci-info"><div class="ci-name">'+E(c.name)+'</div><div class="ci-meta">'+E(c.ql)+(c.n>1?' × '+c.n:'')+'</div>'+(SP&&c.price>0?'<div class="ci-price">₹'+c.price+'/kg</div>':'')+'</div><button class="ci-del" onclick="rem('+i+')">✕</button></div>'});
  $('db').innerHTML=h;
  var f='',n=cart.reduce(function(s,c){return s+c.n},0);
  f+='<div class="df-row"><span class="df-count">'+n+' item'+(n>1?'s':'')+'</span>';
  if(SP){var est=0;cart.forEach(function(c){var kg=c.qu==='kg'?c.qv:c.qu==='g'?c.qv/1000:1;est+=c.price*kg*c.n});f+='<span class="df-price">~₹'+Math.round(est)+'</span>'}
  else f+='<span class="df-price" style="color:var(--T3);font-size:13px">Price on call</span>';
  f+='</div>';
  f+='<div class="df-btns"><button class="df-btn df-wa" onclick="goCheckout()" style="background:var(--R)"><span class="df-icon">📋</span> Proceed to Order</button></div>';
  $('dft').innerHTML=f;
}

function goCheckout(){
  drStep='checkout';
  $('db').scrollTop=0;
  renDr();
}

function goBackToCart(){
  drStep='cart';
  renDr();
}

function renCheckout(){
  $('drawer-title2').textContent='Order Details';
  var n=cart.reduce(function(s,c){return s+c.n},0);
  
  var h='<div class="co">';
  
  // Welcome back banner for returning customers
  if(savedCust.name){
    h+='<div style="background:var(--Gbg);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px"><span style="font-size:24px">👋</span><div><div style="font:700 13px var(--F);color:var(--G)">Welcome back, '+E(savedCust.name)+'!</div><div style="font:400 11px var(--F);color:var(--T3);margin-top:2px">Your details are pre-filled from last order</div></div></div>';
  }
  
  // Items summary
  h+='<div class="co-items">';
  cart.forEach(function(c){
    h+='<div class="co-item"><span class="co-item-name">'+c.em+' '+E(c.name)+'</span><span class="co-item-qty">'+E(c.ql)+(c.n>1?' ×'+c.n:'')+'</span></div>';
  });
  h+='</div>';
  
  // Error message (hidden)
  h+='<div class="co-error" id="coErr">⚠️ <span id="coErrMsg"></span></div>';
  
  // Name
  h+='<div class="co-section"><div class="co-label">Your Name *</div>';
  h+='<input class="co-input" id="coName" placeholder="Enter your name" value="'+E(savedCust.name||'')+'"></div>';
  
  // Phone
  h+='<div class="co-section"><div class="co-label">Phone Number *</div>';
  h+='<input class="co-input" id="coPhone" placeholder="10-digit phone number" type="tel" maxlength="10" value="'+E(savedCust.phone||'')+'"></div>';
  
  // Delivery / Pickup
  h+='<div class="co-section"><div class="co-label">Order Type</div>';
  h+='<div class="co-mode">';
  h+='<button class="co-mode-btn'+(orderMode==='delivery'?' active':'')+'" onclick="setMode(\'delivery\',this)">🛵 Delivery</button>';
  h+='<button class="co-mode-btn'+(orderMode==='pickup'?' active':'')+'" onclick="setMode(\'pickup\',this)">🏪 Pickup</button>';
  h+='</div></div>';
  
  // Address (only for delivery)
  h+='<div class="co-section" id="coAddrWrap" style="'+(orderMode==='pickup'?'display:none':'')+'">';
  h+='<div class="co-label">Delivery Address *</div>';
  h+='<button class="co-gps" id="coGpsBtn" onclick="getGPS()">📍 Use Current Location</button>';
  h+='<textarea class="co-textarea" id="coAddr" placeholder="House no, street, area, landmark">'+E(savedCust.address||'')+'</textarea>';
  h+='</div>';
  
  // Notes
  h+='<div class="co-section"><div class="co-label">Order Notes (optional)</div>';
  h+='<input class="co-note-input" id="coNotes" placeholder="e.g. Cut into small pieces, extra clean..."></div>';
  
  h+='</div>';
  $('db').innerHTML=h;
  
  // Footer
  var f='<div class="df-btns">';
  f+='<button class="df-btn df-wa" onclick="submitOrder(\'whatsapp\')"><span class="df-icon">💬</span> Order on WhatsApp</button>';
  f+='<button class="df-btn df-call" onclick="submitOrder(\'call\')"><span class="df-icon">📞</span> Call to Order</button>';
  f+='<button class="df-btn" onclick="goBackToCart()" style="background:var(--BG);color:var(--T2);box-shadow:none;height:44px;font-size:14px">← Back to Cart</button>';
  f+='</div>';
  $('dft').innerHTML=f;
}

function setMode(mode,el){
  orderMode=mode;
  el.parentElement.querySelectorAll('.co-mode-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  var aw=$('coAddrWrap');
  if(aw)aw.style.display=mode==='pickup'?'none':'';
}

function getGPS(){
  var btn=$('coGpsBtn');
  if(!navigator.geolocation){btn.textContent='📍 Location not available';return}
  btn.classList.add('loading');btn.textContent='📍 Getting location...';
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude;
    btn.textContent='📍 Location found! Getting address...';
    // Reverse geocode
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json')
    .then(function(r){return r.json()})
    .then(function(d){
      var addr=d.display_name||('Lat: '+lat+', Lng: '+lng);
      $('coAddr').value=addr;
      btn.textContent='✓ Location set';btn.classList.remove('loading');
    }).catch(function(){
      $('coAddr').value='Lat: '+lat+', Lng: '+lng;
      btn.textContent='✓ Coordinates set';btn.classList.remove('loading');
    });
  },function(){
    btn.textContent='📍 Location denied — enter manually';btn.classList.remove('loading');
  },{enableHighAccuracy:true,timeout:10000});
}

function submitOrder(method){
  var name=($('coName')||{}).value||'';name=name.trim();
  var phone=($('coPhone')||{}).value||'';phone=phone.trim();
  var addr=($('coAddr')||{}).value||'';addr=addr.trim();
  var notes=($('coNotes')||{}).value||'';notes=notes.trim();
  
  // Validate
  if(!name){showCoErr('Please enter your name');$('coName').focus();return}
  if(!phone||phone.length<10){showCoErr('Please enter a valid 10-digit phone number');$('coPhone').focus();return}
  if(orderMode==='delivery'&&!addr){showCoErr('Please enter your delivery address');$('coAddr').focus();return}
  
  // Save customer info + mode
  savedCust={name:name,phone:phone,address:addr,mode:orderMode};
  try{localStorage.setItem('sp_meat_cust',JSON.stringify(savedCust))}catch(e){}
  
  var shopName=G('shopname','Meat Shop');
  var shopPhone=G('whatsapp','')||G('phone','');
  if(!shopPhone){alert('Shop phone not configured');return}
  
  // Build message
  var msg='🥩 *New Order — '+shopName+'*\n\n';
  msg+='👤 *'+name+'*\n';
  msg+='📞 '+phone+'\n';
  if(orderMode==='delivery'&&addr)msg+='📍 '+addr+'\n';
  else msg+='🏪 Pickup\n';
  msg+='\n*Order:*\n';
  cart.forEach(function(c){
    msg+='• '+c.name+' — '+c.ql+(c.n>1?' ×'+c.n:'');
    if(SP&&c.price>0)msg+=' (₹'+c.price+'/kg)';
    msg+='\n';
  });
  if(SP){
    var est=0;cart.forEach(function(c){var kg=c.qu==='kg'?c.qv:c.qu==='g'?c.qv/1000:1;est+=c.price*kg*c.n});
    msg+='\n💰 Estimated: ~₹'+Math.round(est);
  }
  if(notes)msg+='\n📝 '+notes;
  msg+='\n\n🙏 Please confirm availability & price';
  
  if(method==='whatsapp'){
    window.open('https://wa.me/'+String(shopPhone).replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank');
  }else{
    // Copy message to clipboard, then call
    try{navigator.clipboard.writeText(msg)}catch(e){}
    location.href='tel:+'+String(shopPhone).replace(/\D/g,'');
  }
  
  // Clear cart
  cart=[];updBar();closeDr();
}

function showCoErr(msg){
  var el=$('coErr');if(!el)return;
  el.style.display='flex';$('coErrMsg').textContent=msg;
  setTimeout(function(){el.style.display='none'},4000);
  // Scroll error into view
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function call(){var ph=G('phone','')||G('whatsapp','');if(ph)location.href='tel:+'+String(ph).replace(/\D/g,'')}

init();

// ═══ PWA ═══
var APP_VERSION='1.0.0.1';
var _installPrompt=null;

// Capture install prompt
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  _installPrompt=e;
  // Show install banner (only if not already installed)
  if(!window.matchMedia('(display-mode:standalone)').matches){
    $('installBar').classList.add('show');
  }
});

function installApp(){
  if(!_installPrompt){
    // Fallback for browsers that don't fire beforeinstallprompt
    alert('To install: tap browser menu (⋮) → "Add to Home Screen" or "Install App"');
    return;
  }
  _installPrompt.prompt();
  _installPrompt.userChoice.then(function(r){
    if(r.outcome==='accepted'){$('installBar').style.display='none'}
    _installPrompt=null;
  });
}

// Hide install banner if already installed as PWA
window.addEventListener('appinstalled',function(){
  $('installBar').style.display='none';
  _installPrompt=null;
