<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c831f">
<title>Fast Food — StorePro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--white:#fff;--bg:#fafafa;--card:#fff;--ink:#1a1a1a;--ink2:#3d3d3d;--ink3:#7a7a7a;--ink4:#b0b0b0;--brand:#0c831f;--brand-bg:#e8faed;--brand-dk:#065a14;--green:#0c831f;--green-bg:#e8faed;--orange:#f59e0b;--orange-bg:#fff4eb;--red:#dc2626;--red-bg:#fdecea;--line:#ebebeb;--line2:#d9d9d9;--sh:0 1px 4px rgba(0,0,0,.05);--sh2:0 4px 16px rgba(0,0,0,.08);--sh3:0 8px 32px rgba(0,0,0,.12);--r:8px;--r2:12px;--r3:16px;--pill:100px;--f:'DM Sans',system-ui,sans-serif;--ease:cubic-bezier(.4,0,.2,1);--mw:780px;--px:max(16px,env(safe-area-inset-left,16px))}
body{font-family:var(--f);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100dvh;line-height:1.5}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Top */
.top{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;padding:12px var(--px);display:flex;align-items:center;gap:12px;max-width:var(--mw);margin:0 auto}
.top-back{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}.top-back:hover{background:var(--line)}
.top-info{flex:1;min-width:0}
.top-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-meta{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:6px;margin-top:1px}
.top-status{display:inline-flex;align-items:center;gap:4px;font-weight:700;font-size:10px;padding:2px 8px;border-radius:20px}.ts-open{background:var(--green-bg);color:var(--green)}.ts-closed{background:var(--red-bg);color:var(--red)}
.top-cart-icon{width:36px;height:36px;border-radius:50%;background:var(--bg);position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center}
.top-cart-icon:hover{background:var(--brand-bg)}
.top-cart-badge{position:absolute;top:-2px;right:-2px;background:var(--brand);color:#fff;font:800 10px var(--f);min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:2px solid var(--white)}
.top-cart-badge.pop{animation:pop .3s var(--ease)}

/* Hero */
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--brand-dk),var(--brand))}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.45;mix-blend-mode:overlay}
.hero-content{position:relative;max-width:var(--mw);margin:0 auto;padding:14px var(--px) 14px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;gap:4px}
.hero-tagline{font-size:11px;opacity:.85;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.hero-blessing{font-size:11px;opacity:.95;font-weight:600;letter-spacing:.1em;text-shadow:0 1px 4px rgba(0,0,0,.3);padding:3px 14px;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border-radius:20px;display:inline-block;align-self:flex-start;border:1px solid rgba(255,255,255,.2);color:#fbbf24}
.hero-title{font-size:24px;font-weight:800;line-height:1.15;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.hero-info{display:flex;gap:8px;margin-top:6px;font-size:11px;font-weight:600;flex-wrap:wrap}
.hero-info span{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);padding:3px 10px;border-radius:var(--pill)}
.hero-cta{background:#fff;color:var(--brand);border:none;padding:8px 18px;border-radius:var(--pill);font:800 12px var(--f);cursor:pointer;margin-top:8px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.18);transition:.2s var(--ease);letter-spacing:.04em;align-self:flex-start}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.25)}.hero-cta:active{transform:scale(.97)}
.hero-cta::after{content:'→';font-size:16px;transition:.2s}
.hero-cta:hover::after{transform:translateX(3px)}

/* Filters */
.filters{background:var(--white);border-bottom:1px solid var(--line);padding:10px var(--px);max-width:var(--mw);margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:nowrap;position:sticky;top:61px;z-index:49;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}
.veg-toggle{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;padding:4px 10px;border-radius:var(--pill);transition:.15s;border:1px solid transparent;flex-shrink:0;white-space:nowrap}
.veg-toggle.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.veg-toggle .swt{position:relative;width:32px;height:18px;background:var(--line2);border-radius:20px;transition:.2s}
.veg-toggle .swt::before{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.veg-toggle.active .swt{background:var(--green)}.veg-toggle.active .swt::before{transform:translateX(14px)}

.search-wrap{flex:1;min-width:140px;position:relative}
.search-input{width:100%;height:36px;padding:0 32px 0 34px;border:1.5px solid var(--line);border-radius:var(--r);font:500 13px var(--f);background:var(--bg);outline:none}.search-input:focus{border-color:var(--brand);background:var(--white)}
.search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;background:var(--line);color:var(--ink3);border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}.search-clear:hover{background:var(--ink4);color:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink3)}

/* Category nav */
.cat-nav{background:var(--white);border-bottom:1px solid var(--line);max-width:var(--mw);margin:0 auto;display:flex;gap:6px;overflow-x:scroll;overflow-y:hidden;scrollbar-width:none;position:sticky;top:113px;z-index:48;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;padding:0 var(--px);box-sizing:border-box}.cat-nav::-webkit-scrollbar{display:none}
.cat-nav::after{content:'';min-width:var(--px);flex-shrink:0}
.cat-nav-btn{padding:10px 16px;font:600 12px var(--f);color:var(--ink3);background:transparent;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0}.cat-nav-btn:hover{color:var(--ink2)}.cat-nav-btn.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}

/* Scroll fade hint on right edge */
.cat-nav-wrap{position:relative;max-width:var(--mw);margin:0 auto}
.cat-nav-wrap::after{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,var(--white));pointer-events:none;z-index:1}

/* Menu */
.menu{max-width:var(--mw);margin:0 auto;padding:8px 0 120px}
.menu-section{padding:16px var(--px) 8px;background:var(--white);margin-bottom:8px}
.menu-section-title{font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.menu-section-count{font-size:11px;color:var(--ink4);font-weight:500}

.dish{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);transition:.2s;cursor:pointer}
.dish:hover{background:rgba(0,0,0,.015)}
.dish:last-child{border-bottom:none}
.dish.oos{opacity:.6;cursor:default}
.dish.oos:hover{background:transparent}
.dish-info{flex:1;min-width:0}
.dish-tag{display:inline-block;width:14px;height:14px;border:2px solid;border-radius:3px;margin-bottom:6px;position:relative;flex-shrink:0}
.dish-tag::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%}
.dish-tag.veg{border-color:var(--green)}.dish-tag.veg::after{background:var(--green)}
.dish-tag.nv{border-color:var(--red)}.dish-tag.nv::after{background:var(--red)}
.dish-name{font-size:14px;font-weight:700;line-height:1.3}
.dish-bestseller{display:inline-flex;align-items:center;gap:3px;background:var(--orange-bg);color:var(--orange);font:700 9px var(--f);padding:2px 6px;border-radius:4px;margin-left:6px}
.dish-price-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.dish-price{font-size:14px;font-weight:800;color:var(--ink)}
.dish-mrp{font-size:12px;color:var(--ink4);text-decoration:line-through}
.dish-off{font-size:10px;color:var(--green);font-weight:700;background:var(--green-bg);padding:1px 6px;border-radius:3px}
.dish-desc{font-size:12px;color:var(--ink3);margin-top:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dish-meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11px;color:var(--ink3)}
.dish-meta span{display:inline-flex;align-items:center;gap:3px}
.dish-rating{color:var(--green);font-weight:700}

/* Inline add button — below dish info on left side */
.dish-add-inline{background:var(--brand);color:#fff;border:none;padding:7px 16px;border-radius:var(--r);font:700 12px var(--f);cursor:pointer;margin-top:10px;display:inline-flex;align-items:center;gap:4px;transition:.15s;letter-spacing:.02em}
.dish-add-inline:hover{filter:brightness(1.1)}.dish-add-inline:active{transform:scale(.96)}

/* Inline stepper — left side quantity control */
.dish-info-actions{display:flex;align-items:center;gap:10px;margin-top:10px}
.dish-stepper-inline{display:flex;align-items:center;border:1.5px solid var(--brand);border-radius:var(--r);overflow:hidden}
.dish-stepper-inline button{width:30px;height:28px;border:none;background:var(--brand-bg);color:var(--brand);font:700 15px var(--f);cursor:pointer;display:flex;align-items:center;justify-content:center}.dish-stepper-inline button:hover{background:var(--brand);color:#fff}
.dish-stepper-inline span{min-width:28px;text-align:center;color:var(--brand);font:700 13px var(--f)}
.dish-item-total{font-size:13px;font-weight:800;color:var(--brand)}
.dish-oos-tag{font-size:11px;color:var(--red);font-weight:700;margin-top:8px;background:var(--red-bg);padding:4px 10px;border-radius:var(--r);display:inline-block}
.dish-img-area{width:120px;height:120px;flex-shrink:0;position:relative}
.dish-img{width:100%;height:100%;border-radius:var(--r2);object-fit:cover;background:var(--bg)}
.dish-img-ph{width:100%;height:100%;border-radius:var(--r2);background:linear-gradient(135deg,var(--bg),var(--card));display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.4;border:1px solid var(--line)}
.dish-add-btn{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);height:32px;min-width:80px;padding:0 16px;border:1.5px solid var(--brand);border-radius:var(--r);background:var(--white);color:var(--brand);font:700 12px var(--f);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:.15s;letter-spacing:.04em}.dish-add-btn:hover{background:var(--brand);color:#fff}.dish-add-btn:active{transform:translateX(-50%) scale(.95)}
.dish-stepper{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);height:32px;display:flex;align-items:center;border:1.5px solid var(--brand);border-radius:var(--r);overflow:hidden;background:var(--brand);box-shadow:0 2px 8px rgba(230,57,70,.25)}
.dish-stepper button{width:30px;height:100%;border:none;background:transparent;color:#fff;font:700 16px var(--f);cursor:pointer}.dish-stepper button:hover{background:rgba(255,255,255,.15)}
.dish-stepper span{min-width:28px;text-align:center;color:#fff;font:700 13px var(--f)}
.dish-customize{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.95);backdrop-filter:blur(4px);font:600 9px var(--f);color:var(--brand);padding:3px 8px;border-radius:var(--pill);text-transform:uppercase;letter-spacing:.04em}

/* Customization modal */
.cust-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;align-items:flex-end;justify-content:center}
.cust-bg.open{display:flex;animation:fadeIn .2s}
.cust-box{background:var(--white);border-radius:var(--r3) var(--r3) 0 0;max-width:var(--mw);width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .25s var(--ease);padding:0}
.cust-hdr{padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--white);z-index:5;display:flex;align-items:center;justify-content:space-between}
.cust-title{font-size:16px;font-weight:800}
.cust-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.cust-body{padding:16px 20px}
.cust-section{margin-bottom:16px}
.cust-sec-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;color:var(--ink2)}
.cust-sec-sub{font-size:10px;color:var(--ink4);font-weight:600;margin-left:6px}
.cust-options{display:flex;flex-direction:column;gap:6px}
.cust-opt{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--r);cursor:pointer;transition:.15s}
.cust-opt:hover{border-color:var(--ink3)}
.cust-opt.selected{border-color:var(--brand);background:var(--brand-bg)}
.cust-opt-left{display:flex;align-items:center;gap:8px}
.cust-opt-radio{width:16px;height:16px;border:2px solid var(--line2);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cust-opt.selected .cust-opt-radio{border-color:var(--brand)}
.cust-opt.selected .cust-opt-radio::after{content:'';width:8px;height:8px;background:var(--brand);border-radius:50%}
.cust-opt-name{font-size:13px;font-weight:600}
.cust-opt-price{font-size:12px;font-weight:700;color:var(--ink)}
.cust-opt-price.free{color:var(--green)}
.cust-checkbox{width:18px;height:18px;border:2px solid var(--line2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cust-opt.selected .cust-checkbox{background:var(--brand);border-color:var(--brand)}.cust-opt.selected .cust-checkbox::after{content:'✓';color:#fff;font-size:11px;font-weight:800}
.cust-instructions{width:100%;min-height:60px;padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--r);font:500 13px var(--f);outline:none;resize:vertical;font-family:var(--f)}.cust-instructions:focus{border-color:var(--brand)}
.cust-foot{position:sticky;bottom:0;background:var(--white);padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.cust-qty{display:flex;align-items:center;border:1.5px solid var(--brand);border-radius:var(--r);overflow:hidden;height:42px}
.cust-qty button{width:32px;height:100%;border:none;background:var(--brand-bg);color:var(--brand);font:700 16px var(--f);cursor:pointer}.cust-qty button:hover{background:var(--brand);color:#fff}
.cust-qty span{min-width:28px;text-align:center;font:700 14px var(--f);color:var(--brand);padding:0 4px}
.cust-add{flex:1;height:42px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font:700 13px var(--f);cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:0 16px}.cust-add:hover{filter:brightness(1.1)}
.cust-add-price{background:rgba(255,255,255,.2);padding:4px 8px;border-radius:4px;font-weight:800}

/* Sticky cart bar */
/* Store Info Section */
.store-info-section{max-width:var(--mw);margin:20px auto;padding:0 var(--px)}
.store-info-hdr{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.store-map{width:100%;height:200px;border-radius:var(--r2);overflow:hidden;background:var(--bg);border:1px solid var(--line);margin-bottom:12px}
.store-map iframe{width:100%;height:100%;border:0}
.store-map-link{display:block;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink3);font-size:12px;font-weight:600}
.store-info-details{display:flex;flex-direction:column;gap:8px}
.store-info-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);transition:.15s}
.store-info-row:hover{border-color:var(--brand)}
.store-info-row a{color:var(--brand);font-weight:700;text-decoration:none}
.store-info-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.store-info-text{flex:1;font-size:12px;color:var(--ink2);line-height:1.5}
.store-info-text strong{color:var(--ink);font-weight:700}
.store-wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:#25d366;color:#fff;border-radius:var(--r);font:700 13px var(--f);text-decoration:none;transition:.15s;border:none;cursor:pointer;width:100%}
.store-wa-btn:hover{background:#1da851}
.store-wa-btn svg{width:20px;height:20px;fill:#fff}

/* Footer */
.store-footer{max-width:var(--mw);margin:0 auto;padding:24px var(--px) 120px;border-top:1px solid var(--line)}
.footer-inner{text-align:center}
.footer-brand{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:4px}
.footer-links{font-size:11px;color:var(--ink3);line-height:1.6;margin-bottom:12px}
.footer-powered{font-size:10px;color:var(--ink4);padding-top:12px;border-top:1px solid var(--line)}
.footer-powered strong{color:var(--brand);font-weight:700}

/* Floating WhatsApp Button */
.wa-float{position:fixed;bottom:80px;right:16px;width:52px;height:52px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,.4);z-index:80;transition:.3s;cursor:pointer;text-decoration:none}
.wa-float:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(37,211,102,.5)}
.wa-float:active{transform:scale(.95)}
.wa-float.with-cart{bottom:140px}

.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:90;transform:translateY(100%);transition:.3s var(--ease);pointer-events:none}.cart-bar.show{transform:translateY(0);pointer-events:auto}
.cart-bar-in{max-width:var(--mw);margin:0 auto;padding:0 var(--px) env(safe-area-inset-bottom)}
.cart-bar-card{background:linear-gradient(135deg,var(--brand-dk),var(--brand));color:#fff;border-radius:var(--r3) var(--r3) 0 0;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.cart-bar-card:hover{filter:brightness(1.08)}
.cb-left{display:flex;align-items:center;gap:10px}
.cb-count{background:rgba(255,255,255,.25);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.cb-text{display:flex;flex-direction:column}
.cb-items{font-weight:800;font-size:13px}.cb-total{font-size:11px;opacity:.9}
.cb-free-msg{font-size:10px;opacity:.9;margin-top:2px;display:flex;align-items:center;gap:4px}
.cb-free-bar{width:60px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.cb-free-fill{height:100%;background:#fff;border-radius:2px;transition:.3s}
.cb-go{font-weight:800;font-size:13px;display:flex;align-items:center;gap:6px}

/* Cart drawer */
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:420px;background:var(--white);z-index:150;transform:translateX(100%);transition:transform .3s var(--ease);display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.1)}
.cart-drawer.open{transform:translateX(0)}
.cart-drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:140;opacity:0;pointer-events:none;transition:.3s}
.cart-drawer-bg.open{opacity:1;pointer-events:auto}
.cd-hdr{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.cd-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}

/* Order Tracking */

.daily-special-badge::before{content:'';width:7px;height:7px;background:#dc2626;border-radius:50%;animation:dsBlink 1.2s ease infinite;box-shadow:0 0 4px #dc2626}
@keyframes dsBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.daily-special-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.daily-special-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.95;text-shadow:0 1px 4px rgba(0,0,0,.6)}

.daily-special-desc{font-size:11px;opacity:.9;text-shadow:0 1px 4px rgba(0,0,0,.6);max-width:320px;line-height:1.4}

.daily-special-cta:hover{transform:translateX(3px);box-shadow:0 6px 18px rgba(0,0,0,.3)}
.daily-special-cta:active{transform:translateX(3px) scale(.96)}
.daily-special-cta::after{content:'→';font-size:14px}

@media(max-width:640px){.daily-special-name{font-size:18px}.daily-special-content{min-height:130px;padding:14px 14px}.daily-special-price{font-size:17px;padding:8px 12px}}

var MASTER_SHEET_ID="1K6jYaOrnmMLw_0_N5EvrgE5jEOpbIsWZjyCM8Yf6OLg";

function dsImgFail(){var c=document.getElementById('dsCard');if(c){var img=c.querySelector('.daily-special-img-el');if(img)img.style.display='none';c.style.background='linear-gradient(135deg,var(--brand-dk),var(--brand))'}}

// ══ DATA LOADING ══
function loadSheet(name,cb){
  if(!window.google)window.google={};if(!window.google.visualization)window.google.visualization={};if(!window.google.visualization.Query)window.google.visualization.Query={};
  window.google.visualization.Query.setResponse=cb;
  var s=document.createElement('script');

  s.onerror=function(){cb(null)};
  document.body.appendChild(s);
}
function parseRows(r){
  if(!r||!r.table||!r.table.rows||!r.table.rows.length)return[];
  
  var colLabels=(r.table.cols||[]).map(function(c){return(c.label||'').trim()});
  var firstRaw=colLabels[0]||'';
  var headers=[];
  var dataRows=r.table.rows;
  
  // Detect if cols have proper labels or if headers are merged/missing
  if(firstRaw&&firstRaw.split(/\s+/).length<=3&&colLabels.filter(function(l){return l}).length>1){
    headers=colLabels;
  }else{
    // Use row 0 as headers
    var hRow=r.table.rows[0];
    if(hRow&&hRow.c){
      for(var h=0;h<hRow.c.length;h++){
        var hc=hRow.c[h];
        var hv='';if(hc){if(hc.f!=null)hv=String(hc.f).trim();else if(hc.v!=null)hv=String(hc.v).trim()}
        headers.push(hv);
      }
    }
    dataRows=r.table.rows.slice(1);
  }
  
  var results=[];
  for(var i=0;i<dataRows.length;i++){
    var row=dataRows[i];
    var o={};
    headers.forEach(function(hd,j){
      var c=row.c&&row.c[j];
      var v='';
      if(c){if(c.f!=null)v=String(c.f).trim();else if(c.v!=null)v=String(c.v).trim()}
      o[hd.toLowerCase().trim().replace(/\s+/g,'')]=v;
    });
    results.push(o);
  }
  return results;
}

// ══ STORE RESOLUTION ══
function resolveStore(cb){
  var p=new URLSearchParams(window.location.search);
  if(p.get('shop')){SHEET_ID=p.get('shop');SCRIPT_URL=p.get('script')||'';cb();return}
  var slug=p.get('store');
  if(!slug){
    document.body.innerHTML='<div style="padding:40px 20px;text-align:center;font-family:DM Sans,sans-serif"><div style="font-size:48px">🍽️</div><h1 style="margin:12px 0 8px;font-size:22px">Restaurant URL needed</h1><p style="color:#666;font-size:13px">Add ?store=restaurant-slug to the URL</p></div>';
    return;
  }
  if(!window.google)window.google={};if(!window.google.visualization)window.google.visualization={};if(!window.google.visualization.Query)window.google.visualization.Query={};
  window.google.visualization.Query.setResponse=function(r){
    if(!r||!r.table||!r.table.rows||!r.table.rows.length){showNotFound(slug);return}
    // Smart header detection
    var colLabels=(r.table.cols||[]).map(function(c){return(c.label||'').trim()});
    var firstRaw=colLabels[0]||'';
    var headers=[];var dataRows=r.table.rows;
    if(firstRaw&&firstRaw.split(/\s+/).length<=3&&colLabels.filter(function(l){return l}).length>1){
      headers=colLabels;
    }else{
      var hRow=r.table.rows[0];
      if(hRow&&hRow.c){for(var h=0;h<hRow.c.length;h++){var hc=hRow.c[h];var hv='';if(hc){if(hc.f!=null)hv=String(hc.f).trim();else if(hc.v!=null)hv=String(hc.v).trim()}headers.push(hv)}}
      dataRows=r.table.rows.slice(1);
    }
    var found=false;
    for(var i=0;i<dataRows.length;i++){
      if(found)break;
      var row=dataRows[i];var o={};
      headers.forEach(function(hd,j){var c=row.c&&row.c[j];var v='';if(c){if(c.f!=null)v=String(c.f).trim();else if(c.v!=null)v=String(c.v).trim()}o[hd.toLowerCase().replace(/\s+/g,'')]=v});
      if((o.slug||'').toLowerCase()===slug.toLowerCase()){
        SHEET_ID=o.sheetid||'';
        SCRIPT_URL=o.scripturl||'';
        found=true;
      }
    }
    if(!SHEET_ID){showNotFound(slug);return}
    cb();
  };
  var s=document.createElement('script');
  s.src='https://docs.google.com/spreadsheets/d/'+MASTER_SHEET_ID+'/gviz/tq?tqx=out:json&sheet=Stores&_t='+Date.now();
  document.body.appendChild(s);
}

function showNotFound(slug){
  var safe=String(slug).replace(/[<>"'&]/g,'');
  document.body.innerHTML='<div style="padding:40px 20px;text-align:center;font-family:DM Sans,sans-serif"><div style="font-size:48px">🔍</div><h1 style="margin:12px 0 8px;font-size:22px">Restaurant not found</h1><p style="color:#666;font-size:13px">"'+safe+'" doesn\'t exist or is no longer active.</p></div>';
}

function checkOpen(timing){
  if(!timing)return true;
  var parts=timing.split('-');if(parts.length!==2)return true;
  var now=new Date(),h=now.getHours()*60+now.getMinutes();
  var ts=parts[0].split(':'),te=parts[1].split(':');
  var s=parseInt(ts[0])*60+parseInt(ts[1]||0),e=parseInt(te[0])*60+parseInt(te[1]||0);
  return h>=s&&h<=e;
}

// ══ CART SYNC ══
function syncCartPrices(){
  if(!allDishes||!allDishes.length)return;
  var changed=false,removed=[];
  cart.forEach(function(item){
    var match=allDishes.find(function(p){return p.name===item.name});
    if(!match){removed.push(item.name);item._oos=true;return}
    var newPrice=fnum(match.price);
    if(item.basePrice!==undefined){
      // Has customizations — only update if base changed proportionally
      var oldBase=item.basePrice;
      if(oldBase!==newPrice){
        var customAdd=item.price-oldBase;
        item.basePrice=newPrice;
        item.price=newPrice+customAdd;
        changed=true;
      }
    }else{
      if(newPrice!==fnum(item.price)){item.price=match.price;changed=true}
    }
    var stock=(match.stock||'').toLowerCase();
    if(stock.indexOf('out')>=0){removed.push(item.name);item._oos=true}
  });
  cart=cart.filter(function(c){return!c._oos});
  if(removed.length)alert(removed.join(', ')+' is no longer available — removed from cart.');
}

function buildCatNav(){
  // Count dishes per category (respecting veg filter)
  var cats={},total=0;
  allDishes.forEach(function(d){
    if(vegOnly){var dv=(d.veg||'').toLowerCase();if(dv!=='yes'&&dv!=='veg'&&dv!=='true')return}
    var c=d.category||'Other';
    cats[c]=(cats[c]||0)+1;
    total++;
  });
  var nav=$('catNav');
  nav.innerHTML='';
  
  // Create "All" button
  var allBtn=document.createElement('button');
  allBtn.className='cat-nav-btn'+(activeCat==='All'?' active':'');
  allBtn.innerHTML='All <span style="opacity:.5;font-size:10px">'+total+'</span>';
  allBtn.onclick=function(){setCat('All',allBtn)};
  nav.appendChild(allBtn);
  
  // Create category buttons
  Object.keys(cats).forEach(function(c){
    var btn=document.createElement('button');
    btn.className='cat-nav-btn'+(activeCat===c?' active':'');
    btn.innerHTML=esc(c)+' <span style="opacity:.5;font-size:10px">'+cats[c]+'</span>';
    btn.onclick=function(){setCat(c,btn)};
    nav.appendChild(btn);
  });
  
  // Auto-scroll active button into view
  setTimeout(function(){
    var activeBtn=nav.querySelector('.cat-nav-btn.active');
    if(activeBtn){
      activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    }
  },50);
}

function setCat(c,el){
  // Set active category state
  activeCat=c;
  // Clear search to avoid filter conflicts
  if($('searchInput'))$('searchInput').value='';
  // Update button highlights — by direct element reference first, then fallback to text match
  document.querySelectorAll('.cat-nav-btn').forEach(function(b){b.classList.remove('active')});
  if(el&&el.classList){
    el.classList.add('active');
  }else{
    // Fallback: match by data attribute or text
    document.querySelectorAll('.cat-nav-btn').forEach(function(b){
      var btnText=(b.textContent||'').trim();
      if(c==='All'&&btnText.indexOf('All')===0)b.classList.add('active');
      else if(c!=='All'&&(btnText===c||btnText.indexOf(c+' ')===0))b.classList.add('active');
    });
  }
  // Re-render menu with new filter
  renderMenu();
  // Scroll smoothly to top of section after render completes
  requestAnimationFrame(function(){
    setTimeout(function(){
      var target;
      if(c==='All'){
        target=$('menu');
      }else{
        var sections=document.querySelectorAll('.menu-section');
        for(var i=0;i<sections.length;i++){
          if(sections[i].getAttribute('data-cat')===c){target=sections[i];break}
        }
      }
      if(target){
        var top=target.getBoundingClientRect().top+window.pageYOffset-150;
        window.scrollTo({top:Math.max(0,top),behavior:'smooth'});
      }
    },80);
  });
}

function renderMenu(){
  var q=($('searchInput')?$('searchInput').value:'').toLowerCase();
  filtered=allDishes.filter(function(d){
    // Veg filter
    if(vegOnly){
      var dv=(d.veg||'').toLowerCase();
      if(dv!=='yes'&&dv!=='veg'&&dv!=='true')return false;
    }
    // Category filter
    if(activeCat!=='All'&&(d.category||'Other')!==activeCat)return false;
    // Search filter
    if(q&&(d.name+' '+(d.description||'')+' '+(d.category||'')).toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  
  if(!filtered.length){
    var emptyMsg='No dishes found';
    var emptySub='Try a different search or category';
    if(vegOnly&&!isVegOnlyRestaurant){
      emptyMsg='No vegetarian dishes in this category';
      emptySub='Turn off Veg Only filter to see all dishes';
    }
    $('menu').innerHTML='<div class="empty-state"><div style="font-size:48px">🔍</div><strong>'+emptyMsg+'</strong><p style="font-size:12px;margin-top:6px;color:var(--ink3)">'+emptySub+'</p></div>';
    return;
  }
  
  // Group by category
  var grouped={};
  filtered.forEach(function(d){var c=d.category||'Other';if(!grouped[c])grouped[c]=[];grouped[c].push(d)});
  
  var html='';
  Object.keys(grouped).forEach(function(catName){
    html+='<div class="menu-section" data-cat="'+esc(catName)+'">';
    html+='<div class="menu-section-title">'+esc(catName)+' <span class="menu-section-count">'+grouped[catName].length+' items</span></div>';
    grouped[catName].forEach(function(d){
      html+=renderDish(d);
    });
    html+='</div>';
  });
  
  $('menu').innerHTML=html;
}

function renderDish(d){
  var i=allDishes.indexOf(d);
  var oos=(d.stock||'').toLowerCase().indexOf('out')>=0;
  var veg=(d.veg||'').toLowerCase();
  var isVeg=veg==='yes'||veg==='veg';
  var isBest=(d.bestseller||'').toLowerCase()==='yes';
  var isCombo=(d.combo||'').toLowerCase()==='yes'||(d.familypack||'').toLowerCase()==='yes';
  var isQuickBulk=(d.quickqty||'').toLowerCase()==='yes'||(d.bulkorder||'').toLowerCase()==='yes';
  var hasCustom=d.options||d.addons||d.sizes;
  var qty=getCartQty(d.name);
  var price=fnum(d.price),mrp=fnum(d.mrp);
  var off=mrp>price?Math.round(((mrp-price)/mrp)*100):0;
  var hindiName=d.hindiname||d.hindi_name||d.namehi||'';
  
  var html='<div class="dish'+(oos?' oos':'')+(isCombo?' combo-dish':'')+'"'+(oos?'':' onclick="onDishTap('+i+',event)"')+'>';
  html+='<div class="dish-info">';
  html+='<div class="dish-tag '+(isVeg?'veg':'nv')+'"></div>';
  html+='<div class="dish-name">'+esc(d.name);
  if(isBest)html+='<span class="dish-bestseller">⭐ सबसे पसंदीदा</span>';
  if(isCombo)html+='<span class="combo-badge">🍱 Combo</span>';
  html+='</div>';
  if(hindiName)html+='<div class="hi-name">'+esc(hindiName)+'</div>';
  html+='<div class="dish-price-row">';
  html+='<span class="dish-price">'+(cfg('currency','₹'))+price.toLocaleString('en-IN')+'</span>';
  if(mrp>price)html+='<span class="dish-mrp">'+(cfg('currency','₹'))+mrp.toLocaleString('en-IN')+'</span>';
  if(off>0)html+='<span class="dish-off">'+off+'% OFF</span>';
  html+='</div>';
  if(d.description)html+='<div class="dish-desc">'+esc(d.description)+'</div>';
  
  // Meta: rating, time, servings
  var meta='';
  if(d.rating)meta+='<span class="dish-rating">⭐ '+esc(d.rating)+'</span>';
  if(d.prepTime||d.preptime)meta+='<span>⏱ '+esc(d.preptime||d.prepTime)+'</span>';
  if(d.serves)meta+='<span>👥 '+esc(d.serves)+'</span>';
  if(d.spicy||d.spicelevel){
    var spice=d.spicy||d.spicelevel;
    meta+='<span>🌶️ '+esc(spice)+'</span>';
  }
  if(meta)html+='<div class="dish-meta">'+meta+'</div>';
  html+='</div>'; // end dish-info
  
  html+='<div class="dish-img-area">';
  var imgUrl=getAutoImage(d);
  var fallbackEmoji=isVeg?'🥗':'🍗';
  var cat_l=(d.category||'').toLowerCase();
  if(cat_l.indexOf('drink')>=0||cat_l.indexOf('beverage')>=0)fallbackEmoji='🥤';
  else if(cat_l.indexOf('dessert')>=0||cat_l.indexOf('sweet')>=0)fallbackEmoji='🍰';
  else if(cat_l.indexOf('bread')>=0||cat_l.indexOf('roti')>=0)fallbackEmoji='🫓';
  else if(cat_l.indexOf('rice')>=0||cat_l.indexOf('biryani')>=0)fallbackEmoji='🍚';
  else if(cat_l.indexOf('noodle')>=0||cat_l.indexOf('chowmein')>=0)fallbackEmoji='🍜';
  else if(cat_l.indexOf('momos')>=0)fallbackEmoji='🥟';
  else if(cat_l.indexOf('soup')>=0)fallbackEmoji='🍲';
  else if(cat_l.indexOf('burger')>=0)fallbackEmoji='🍔';
  else if(cat_l.indexOf('pasta')>=0||cat_l.indexOf('maggi')>=0)fallbackEmoji='🍝';
  else if(cat_l.indexOf('starter')>=0||cat_l.indexOf('finger')>=0)fallbackEmoji='🍢';
  else if(cat_l.indexOf('roll')>=0)fallbackEmoji='🌯';
  else if(cat_l.indexOf('manchurian')>=0||cat_l.indexOf('chinese')>=0)fallbackEmoji='🥡';
  else if(cat_l.indexOf('paneer')>=0||cat_l.indexOf('chaap')>=0)fallbackEmoji='🧀';
  else if(isCombo)fallbackEmoji='🍱';
  // Only show img tag if real image URL exists
  if(imgUrl){
    html+='<img class="dish-img" src="'+esc(imgUrl)+'" alt="'+esc(d.name)+'" loading="lazy" onerror="this.outerHTML=\'<div class=&quot;dish-img-ph&quot;>'+fallbackEmoji+'</div>\'">';
  }else{
    html+='<div class="dish-img-ph">'+fallbackEmoji+'</div>';
  }
  if(hasCustom&&!oos)html+='<div class="dish-customize">Customize</div>';
  
  if(oos){
    html+='<div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font:700 10px var(--f);padding:5px 12px;border-radius:var(--r);text-transform:uppercase;letter-spacing:.05em">Sold Out</div>';
  }else if(qty>0&&!hasCustom){
    html+='<div class="dish-stepper">';
    html+='<button onclick="event.stopPropagation();changeQty('+i+',-1)">−</button>';
    html+='<span>'+qty+'</span>';
    html+='<button onclick="event.stopPropagation();changeQty('+i+',1)">+</button>';
    html+='</div>';
  }else{
    html+='<button class="dish-add-btn" onclick="event.stopPropagation();onAddDish('+i+')">'+(hasCustom?'CUSTOMIZE':'ADD')+(qty>0?' ('+qty+')':'')+'</button>';
  }
  html+='</div>'; // end dish-img-area
  
  // Quick quantity buttons + manual input for bulk items (rotis, parathas, etc.)
  if(isQuickBulk&&!oos&&!hasCustom){
    html+='<div class="qty-quick" style="margin-top:18px;align-items:center;flex-wrap:wrap">';
    html+='<span style="font-size:10px;color:var(--ink3);font-weight:600">Quick:</span>';
    [5,10,20].forEach(function(qq){
      html+='<button class="qty-quick-btn'+(qty===qq?' active':'')+'" onclick="setExactQty('+i+','+qq+')">'+qq+'</button>';
    });
    html+='<input type="number" class="qty-custom-input" min="1" max="999" placeholder="Custom" '+(qty>0&&[5,10,20].indexOf(qty)<0?'value="'+qty+'"':'')+' onkeydown="if(event.key===\'Enter\')setExactQty('+i+',this.value)" onblur="if(this.value)setExactQty('+i+',this.value)" onclick="event.stopPropagation()">';
    html+='</div>';
  }
  
  html+='</div>'; // end dish
  return html;
}

// Set exact quantity (used by quick qty buttons and custom input)
function setExactQty(i,qty){
  var d=allDishes[i];if(!d)return;
  qty=parseInt(qty)||0;
  if(qty<0)qty=0;
  if(qty>999)qty=999;
  // Remove existing cart entries for this dish (without customization)
  cart=cart.filter(function(c){return!(c.name===d.name&&!c.customization)});
  // Add new entry with the exact quantity
  if(qty>0){
    cart.push({
      name:d.name,
      category:d.category,
      basePrice:fnum(d.price),
      price:fnum(d.price),
      qty:qty,
      customization:null,
      veg:(d.veg||'').toLowerCase()
    });
    showToast(qty+'x '+d.name+' added');
  }else{
    showToast(d.name+' removed from cart');
  }
  saveCart();renderMenu();updateCartBar();
}

// ══ ADD DISH ══
function onAddDish(i){
  var d=allDishes[i];
  if(!d)return;
  var hasCustom=d.options||d.addons||d.sizes;
  if(hasCustom){openCustomization(d)}
  else{addToCart(d,1,null,d.price);showAddedFeedback(d.name)}
}

// Handle tapping anywhere on the dish card
function onDishTap(i,e){
  // Don't trigger if user tapped a button, stepper, or input inside the card
  var tag=e.target.tagName.toLowerCase();
  if(tag==='button'||tag==='input')return;
  // Don't trigger if tapped on stepper area
  if(e.target.closest&&(e.target.closest('.dish-stepper')||e.target.closest('.dish-add-btn')||e.target.closest('.qty-quick')))return;
  onAddDish(i);
}

function showAddedFeedback(name){
  showToast('✓ '+name+' added to cart');
  var badge=$('cartBadge');
  badge.classList.remove('pop');void badge.offsetWidth;badge.classList.add('pop');
}

function changeQty(i,delta){
  var d=allDishes[i];if(!d)return;
  // Find FIRST cart item matching name (without customization)
  var idx=cart.findIndex(function(c){return c.name===d.name&&!c.customization});
  if(idx>=0){
    cart[idx].qty+=delta;
    if(cart[idx].qty<=0)cart.splice(idx,1);
  }else if(delta>0){
    addToCart(d,1,null,d.price);
  }
  saveCart();renderMenu();updateCartBar();
}

function addToCart(dish,qty,customization,price){
  // Check if exact same item exists (same name + same customization)
  var custKey=customization?JSON.stringify(customization):null;
  var existing=cart.find(function(c){
    var ck=c.customization?JSON.stringify(c.customization):null;
    return c.name===dish.name&&ck===custKey;
  });
  if(existing){existing.qty+=qty}
  else{
    cart.push({
      name:dish.name,
      category:dish.category,
      basePrice:fnum(dish.price),
      price:fnum(price),
      qty:qty,
      customization:customization,
      veg:(dish.veg||'').toLowerCase()
    });
  }
  saveCart();renderMenu();updateCartBar();
}

function saveCart(){try{localStorage.setItem('rest_cart_'+SHEET_ID,JSON.stringify(cart))}catch(e){}}

function updateCartBar(){
  var bar=$('cartBar'),badge=$('cartBadge');
  if(!cart.length){bar.classList.remove('show');badge.style.display='none';var wf=$('waFloat');if(wf)wf.classList.remove('with-cart');return}
  bar.classList.add('show');
  var wf=$('waFloat');if(wf)wf.classList.add('with-cart');
  var totalItems=cart.reduce(function(s,c){return s+c.qty},0);
  var totalPrice=cart.reduce(function(s,c){return s+c.price*c.qty},0);
  $('cbCount').textContent=totalItems;
  $('cbItems').textContent=totalItems+' item'+(totalItems!==1?'s':'');
  
  // Free delivery progress
  var freeAbove=fnum(cfg('freedelivery','0'));
  var freeMsg=$('cbFreeMsg');
  if(freeAbove>0&&freeMsg){
    var remaining=freeAbove-totalPrice;
    if(remaining<=0){
      freeMsg.innerHTML='🎉 Free delivery unlocked!';
    }else{
      var pct=Math.min(100,Math.round((totalPrice/freeAbove)*100));
      freeMsg.innerHTML='Add '+cfg('currency','₹')+remaining+' for free delivery <span class="cb-free-bar"><span class="cb-free-fill" style="width:'+pct+'%"></span></span>';
    }
    freeMsg.style.display='flex';
  }else if(freeMsg){
    freeMsg.style.display='none';
  }
  
  $('cbTotal').textContent=cfg('currency','₹')+totalPrice.toLocaleString('en-IN');
  badge.style.display='flex';badge.textContent=totalItems;
}

// ══ CUSTOMIZATION MODAL ══
function openCustomization(dish){
  currentCustomDish=dish;
  custQtySelected=1;
  custSelections={size:null,addons:[],spice:'Medium',instructions:''};
  $('custTitle').textContent=dish.name;
  $('custQtyVal').textContent='1';
  
  var html='';
  
  // Sizes (e.g. "Half:120, Full:200")
  if(dish.sizes){
    html+='<div class="cust-section"><div class="cust-sec-h">Choose Size <span class="cust-sec-sub">Required</span></div><div class="cust-options">';
    var sizes=dish.sizes.split(/[,]+/).map(function(s){return s.trim()});
    // If only 1 result but contains multiple Name:Price pairs, split by space before uppercase word
    if(sizes.length===1&&sizes[0].indexOf(' ')>0){
      sizes=sizes[0].split(/\s+(?=[A-Z])/).map(function(s){return s.trim()}).filter(function(s){return s.indexOf(':')>0});
    }
    sizes.forEach(function(s,idx){
      var parts=s.split(':');
      var name=parts[0].trim(),price=fnum(parts[1]);
      var sel=idx===0;
      if(sel)custSelections.size={name:name,price:price};
      html+='<div class="cust-opt'+(sel?' selected':'')+'" onclick="selectSize(\''+esc(name)+'\','+price+',this)">';
      html+='<div class="cust-opt-left"><div class="cust-opt-radio"></div><div class="cust-opt-name">'+esc(name)+'</div></div>';
      html+='<div class="cust-opt-price">'+(cfg('currency','₹'))+price+'</div></div>';
    });
    html+='</div></div>';
  }
  
  // Add-ons (e.g. "Extra Cheese:30, Extra Paneer:40")
  if(dish.addons){
    html+='<div class="cust-section"><div class="cust-sec-h">Add-ons <span class="cust-sec-sub">Optional</span></div><div class="cust-options">';
    var addons=dish.addons.split(/[,]+/).map(function(a){return a.trim()});
    if(addons.length===1&&addons[0].indexOf(' ')>0){
      addons=addons[0].split(/\s+(?=[A-Z])/).map(function(a){return a.trim()}).filter(function(a){return a.indexOf(':')>0});
    }
    addons.forEach(function(a){
      var parts=a.split(':');
      var name=parts[0].trim(),price=fnum(parts[1]);
      html+='<div class="cust-opt" onclick="toggleAddon(\''+esc(name)+'\','+price+',this)">';
      html+='<div class="cust-opt-left"><div class="cust-checkbox"></div><div class="cust-opt-name">'+esc(name)+'</div></div>';
      html+='<div class="cust-opt-price'+(price===0?' free':'')+'">+'+(cfg('currency','₹'))+price+'</div></div>';
    });
    html+='</div></div>';
  }
  
  // Spice level
  html+='<div class="cust-section"><div class="cust-sec-h">Spice Level</div><div class="cust-options">';
  ['Mild','Medium','Spicy'].forEach(function(level){
    var sel=level==='Medium';
    html+='<div class="cust-opt'+(sel?' selected':'')+'" onclick="selectSpice(\''+level+'\',this)">';
    html+='<div class="cust-opt-left"><div class="cust-opt-radio"></div><div class="cust-opt-name">'+(level==='Mild'?'🌶':level==='Medium'?'🌶🌶':'🌶🌶🌶')+' '+level+'</div></div>';
    html+='</div>';
  });
  html+='</div></div>';
  
  // Special instructions
  html+='<div class="cust-section"><div class="cust-sec-h">Special Instructions</div>';
  html+='<textarea class="cust-instructions" id="custInstr" placeholder="Any special requests? E.g. less spicy, no onion, etc." oninput="updateCustPrice()"></textarea>';
  html+='</div>';
  
  $('custBody').innerHTML=html;
  updateCustPrice();
  $('custBg').classList.add('open');
}

function selectSize(name,price,el){
  custSelections.size={name:name,price:price};
  el.parentElement.querySelectorAll('.cust-opt').forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected');
  updateCustPrice();
}

function toggleAddon(name,price,el){
  var idx=custSelections.addons.findIndex(function(a){return a.name===name});
  if(idx>=0){custSelections.addons.splice(idx,1);el.classList.remove('selected')}
  else{custSelections.addons.push({name:name,price:price});el.classList.add('selected')}
  updateCustPrice();
}

function selectSpice(level,el){
  custSelections.spice=level;
  el.parentElement.querySelectorAll('.cust-opt').forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected');
}

function custQty(delta){
  custQtySelected=Math.max(1,custQtySelected+delta);
  $('custQtyVal').textContent=custQtySelected;
  updateCustPrice();
}

function updateCustPrice(){
  var base=custSelections.size?custSelections.size.price:fnum(currentCustomDish.price);
  var addons=custSelections.addons.reduce(function(s,a){return s+a.price},0);
  var total=(base+addons)*custQtySelected;
  $('custAddPrice').textContent=cfg('currency','₹')+total.toLocaleString('en-IN');
}

function addCustomized(){
  if(!currentCustomDish)return;
  custSelections.instructions=$('custInstr').value.trim();
  var base=custSelections.size?custSelections.size.price:fnum(currentCustomDish.price);
  var addons=custSelections.addons.reduce(function(s,a){return s+a.price},0);
  var perItemPrice=base+addons;
  
  addToCart(currentCustomDish,custQtySelected,{
    size:custSelections.size,
    addons:custSelections.addons,
    spice:custSelections.spice,
    instructions:custSelections.instructions
  },perItemPrice);
  
  showAddedFeedback(currentCustomDish.name);
  closeCust();
}

function closeCust(){$('custBg').classList.remove('open');currentCustomDish=null}

// ══ CART DRAWER ══
function openCart(){
  if(!cart.length){showToast('Your cart is empty');return}
  syncCartPrices();saveCart();renderCart();
  $('cartDrawer').classList.add('open');$('cartBg').classList.add('open');
}

function closeCart(){$('cartDrawer').classList.remove('open');$('cartBg').classList.remove('open')}

function renderCart(){
  if(!cart.length){
    $('cdBody').innerHTML='<div class="cd-empty"><div style="font-size:48px">🛒</div>Your cart is empty</div>';
    $('cdFooter').style.display='none';return;
  }
  var html='';
  cart.forEach(function(c,i){
    var custDesc='';
    if(c.customization){
      var cust=c.customization;
      var parts=[];
      if(cust.size)parts.push(cust.size.name);
      if(cust.spice&&cust.spice!=='Medium')parts.push(cust.spice);
      if(cust.addons&&cust.addons.length)parts.push('+'+cust.addons.map(function(a){return a.name}).join(', '));
      if(parts.length)custDesc='<div class="ci-cust">'+esc(parts.join(' · '))+'</div>';
      if(cust.instructions)custDesc+='<div class="ci-cust" style="font-style:italic">"'+esc(cust.instructions)+'"</div>';
    }
    html+='<div class="cart-item"><div class="ci-info">';
    html+='<div class="ci-name"><span class="dish-tag '+(c.veg==='yes'||c.veg==='veg'?'veg':'nv')+'" style="margin-bottom:0;width:12px;height:12px"></span>'+esc(c.name)+'</div>';
    html+=custDesc;
    html+='<button class="ci-rm" onclick="removeCart('+i+')">Remove</button>';
    html+='</div>';
    html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
    html+='<div class="ci-q"><button onclick="cartQty('+i+',-1)">−</button><span>'+c.qty+'</span><button onclick="cartQty('+i+',1)">+</button></div>';
    html+='<div class="ci-price">'+(cfg('currency','₹'))+(c.price*c.qty).toLocaleString('en-IN')+'</div>';
    html+='</div></div>';
  });
  $('cdBody').innerHTML=html;
  
  // Footer with full transparent bill breakdown
  var subtotal=cart.reduce(function(s,c){return s+c.price*c.qty},0);
  var minOrder=fnum(cfg('minorder','0'));
  var deliveryFee=fnum(cfg('deliveryfee','0'));
  var freeAbove=fnum(cfg('freedelivery','0'));
  var freeDeliveryApplied=(freeAbove>0&&subtotal>=freeAbove);
  var actualDeliveryFee=freeDeliveryApplied?0:deliveryFee;
  var packingFee=fnum(cfg('packingfee','0'));
  var taxes=fnum(cfg('taxes','0'));
  var grand=subtotal+actualDeliveryFee+packingFee+taxes;
  var cur=cfg('currency','₹');
  
  var ftHtml='';
  
  // Min order warning
  if(minOrder>0&&subtotal<minOrder){
    ftHtml+='<div class="cd-min-warn">⚠️ Add '+cur+(minOrder-subtotal)+' more to meet min order of '+cur+minOrder+'</div>';
  }
  
  // Free delivery progress
  if(freeAbove>0&&!freeDeliveryApplied&&deliveryFee>0){
    var remaining=freeAbove-subtotal;
    var pct=Math.min(100,Math.round((subtotal/freeAbove)*100));
    ftHtml+='<div style="background:var(--brand-bg);padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:11px;color:var(--brand);font-weight:700;display:flex;align-items:center;gap:8px">';
    ftHtml+='<span style="flex:1">🛵 Add '+cur+remaining+' for FREE delivery</span>';
    ftHtml+='<span style="width:50px;height:4px;background:rgba(0,0,0,.1);border-radius:2px;overflow:hidden"><span style="display:block;height:100%;width:'+pct+'%;background:var(--brand);border-radius:2px"></span></span>';
    ftHtml+='</div>';
  }else if(freeDeliveryApplied){
    ftHtml+='<div style="background:var(--green-bg);padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:11px;color:var(--green);font-weight:700;text-align:center">🎉 Free delivery unlocked! You save '+cur+deliveryFee+'</div>';
  }
  
  // Bill rows
  ftHtml+='<div class="cd-row"><span>Subtotal</span><strong>'+cur+subtotal.toLocaleString('en-IN')+'</strong></div>';
  
  // Delivery fee — always show
  if(freeDeliveryApplied){
    ftHtml+='<div class="cd-row" style="text-decoration:line-through;opacity:.4"><span>🛵 Delivery</span><span>'+cur+deliveryFee+'</span></div>';
    ftHtml+='<div class="cd-row" style="color:var(--green);font-weight:700"><span>🛵 Free Delivery</span><span>FREE ✓</span></div>';
  }else if(deliveryFee>0){
    ftHtml+='<div class="cd-row"><span>🛵 Delivery</span><span>'+cur+deliveryFee+'</span></div>';
  }else{
    ftHtml+='<div class="cd-row" style="text-decoration:line-through;opacity:.4"><span>🛵 Delivery Fee</span><span>'+cur+(cfg('originaldeliveryfee','')||'30')+'</span></div>';
    ftHtml+='<div class="cd-row" style="color:var(--green);font-weight:700"><span>🛵 Delivery</span><span>FREE ✓</span></div>';
  }
  
  // Packing fee — always show
  if(packingFee>0){
    ftHtml+='<div class="cd-row"><span>📦 Packing</span><span>'+cur+packingFee+'</span></div>';
  }else{
    ftHtml+='<div class="cd-row" style="text-decoration:line-through;opacity:.4"><span>📦 Packing Charges</span><span>'+cur+(cfg('originalpackingfee','')||'20')+'</span></div>';

// UPI QR code generation
function generateUpiQr(){
  var upiId=cfg('upi','');
  if(!upiId)return;
  var shopName=cfg('shopname','Store');
  var subtotal=cart.reduce(function(s,c){return s+c.price*c.qty},0);
  var deliveryFee=activeMode==='delivery'?fnum(cfg('deliveryfee','30')):0;
  var freeAbove=fnum(cfg('freedelivery','999'));
  if(activeMode==='delivery'&&subtotal>=freeAbove)deliveryFee=0;
  var packingFee=fnum(cfg('packingfee','0'));
  var taxes=fnum(cfg('taxes','0'));
  var amount=subtotal+deliveryFee+packingFee+taxes;
  
  var upiUrl='upi://pay?pa='+encodeURIComponent(upiId)+'&pn='+encodeURIComponent(shopName)+'&am='+amount+'&cu=INR&tn='+encodeURIComponent('Order from '+shopName);
  
  // Generate QR using QRCode library (loaded dynamically)
  var qrEl=$('upiQr');
  if(qrEl){
    qrEl.innerHTML='';
    if(window.QRCode){
      new QRCode(qrEl,{text:upiUrl,width:180,height:180,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }else{
      // Load QRCode library dynamically
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
      s.onload=function(){
        if(window.QRCode&&$('upiQr')){
          new QRCode($('upiQr'),{text:upiUrl,width:180,height:180,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
        }
      };
      document.head.appendChild(s);
    }
  }
  
  // Update deep links
  var gpay=$('upiGpay');if(gpay)gpay.href=upiUrl.replace('upi://pay','tez://upi/pay');
  var ppe=$('upiPhonepe');if(ppe)ppe.href=upiUrl.replace('upi://pay','phonepe://pay');
  var ptm=$('upiPaytm');if(ptm)ptm.href=upiUrl.replace('upi://pay','paytmmp://pay');
}

// ══ GEOLOCATION ══
function getCurrentLocation(){
  if(!navigator.geolocation){
    showLocStatus('Your browser does not support location','err');return;
  }
  var btn=$('locBtn'),status=$('locStatus');
  btn.disabled=true;btn.textContent='📍 Getting your location...';
  showLocStatus('Requesting location permission...','');
  
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);
      // Reverse geocode using free Nominatim API
      fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=18&addressdetails=1')
        .then(function(r){return r.json()})
        .then(function(data){
          btn.disabled=false;btn.innerHTML='📍 Use my current location';
          var addr=data.display_name||(lat+', '+lng);
          $('coAddress').value=addr;
          showLocStatus('✓ Location found: '+addr.split(',').slice(0,3).join(','),'ok');
          // Check delivery radius
          checkDeliveryRadius(parseFloat(lat),parseFloat(lng));
        })
        .catch(function(){
          btn.disabled=false;btn.innerHTML='📍 Use my current location';
          $('coAddress').value='Lat: '+lat+', Lng: '+lng;
          showLocStatus('✓ GPS location captured (please add details)','ok');
          checkDeliveryRadius(parseFloat(lat),parseFloat(lng));
        });
    },
    function(err){
      btn.disabled=false;btn.innerHTML='📍 Use my current location';
      var msg='Location access denied';
      if(err.code===1)msg='Permission denied — enable location in browser settings';
      else if(err.code===2)msg='Location unavailable';
      else if(err.code===3)msg='Request timed out';
      showLocStatus(msg,'err');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}

function showLocStatus(msg,type){
  var s=$('locStatus');
  s.style.display='block';s.className='co-loc-status '+(type||'');
  s.textContent=msg;
}

function checkDeliveryRadius(lat,lng){
  var rLat=fnum(cfg('restaurantlat','')),rLng=fnum(cfg('restaurantlng',''));
  var maxKm=fnum(cfg('maxdeliveryradius','5'));
  if(!rLat||!rLng||!maxKm)return;
  var dist=haversine(lat,lng,rLat,rLng);
  var btn=$('placeBtn');
  if(dist>maxKm){
    showLocStatus('⚠️ You are '+dist.toFixed(1)+' km away. We deliver only within '+maxKm+' km.','err');
    btn.disabled=true;
  }else{
    showLocStatus('✓ You are '+dist.toFixed(1)+' km away — within delivery range','ok');
    btn.disabled=false;
  }
}

function haversine(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  var po=window._pendingOrder;
  if(!po){closeConfirm();return}
  
  var btn=$('confirmBtn');
  btn.disabled=true;
  btn.innerHTML='<span style="display:inline-block;animation:spin .6s linear infinite">↻</span> Placing order...';
  
  var name=po.name,phone=po.phone,address=po.address,notes=po.notes;
  var subtotal=po.subtotal,deliveryFee=po.deliveryFee,packingFee=po.packingFee;
  var taxes=po.taxes,grand=po.grand;
  
  // Save customer
  savedCustomer={name:name,phone:phone,address:address};
  try{localStorage.setItem('rest_cust_'+SHEET_ID,JSON.stringify(savedCustomer))}catch(e){}
  
  var oid='ORD-'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).substr(2,3).toUpperCase();
  
  // Build items string
  var itemsStr=cart.map(function(c){
    var s=c.qty+'x '+c.name;
    if(c.customization){
      var cust=c.customization;
      var bits=[];
      if(cust.size)bits.push(cust.size.name);
      if(cust.spice&&cust.spice!=='Medium')bits.push(cust.spice);
      if(cust.addons&&cust.addons.length)bits.push('+'+cust.addons.map(function(a){return a.name}).join(','));
      if(cust.instructions)bits.push('Note: '+cust.instructions);
      if(bits.length)s+=' ['+bits.join(' | ')+']';
    }
    s+=' = ₹'+(c.price*c.qty);
    return s;
  }).join('\n');
  
  // Send to Apps Script
  if(SCRIPT_URL){
    var params='action=newOrder';
    params+='&id='+encodeURIComponent(oid);
    params+='&name='+encodeURIComponent(name);
    params+='&phone='+encodeURIComponent(phone);
    params+='&address='+encodeURIComponent(address);
    params+='&items='+encodeURIComponent(itemsStr);
    params+='&total='+encodeURIComponent(grand);
    params+='&mode='+encodeURIComponent(activeMode);
    params+='&payment='+encodeURIComponent(activePayment);
    params+='&notes='+encodeURIComponent(notes);
    params+='&date='+encodeURIComponent(new Date().toLocaleString('en-IN'));
    var img=new Image();img.src=SCRIPT_URL+'?'+params+'&_t='+Date.now();
  }
  
  // WhatsApp confirmation
  var phoneCfg=cfg('whatsapp',DEFAULT_WA);
  var waMsg='Hi! New order:\n\n*Order #'+oid+'*\n\n👤 '+name+'\n📞 '+phone+'\n'+
    (activeMode==='delivery'?'📍 '+address:'🏪 Pickup')+'\n\n*Items:*\n'+itemsStr+
    '\n\n💰 Subtotal: ₹'+subtotal+
    (deliveryFee>0?'\n🛵 Delivery: ₹'+deliveryFee:deliveryFee===0&&activeMode==='delivery'?'\n🛵 FREE delivery':'')+
    (packingFee>0?'\n📦 Packing: ₹'+packingFee:'')+
    '\n*Total: ₹'+grand+'*'+
    '\n\n💳 Payment: '+(activePayment==='cod'?'Cash on '+(activeMode==='delivery'?'Delivery':'Pickup'):'UPI')+
    (notes?'\n\n📝 Notes: '+notes:'');
  
  var waUrl='https://wa.me/'+phoneCfg+'?text='+encodeURIComponent(waMsg);
  window.open(waUrl,'_blank');
  
  // Clear cart
  cart=[];saveCart();updateCartBar();
  
  // Reset confirm button
  var btn=$('confirmBtn');
  btn.disabled=false;
  btn.innerHTML='<span>✓ Confirm & Place Order</span>';
  
  // Close all modals and show success
  closeConfirm();
  closeCheckout();
  $('successId').textContent=oid;
  saveRecentOrderId(oid);
  $('successTime').textContent=activeMode==='delivery'?'⏱️ Arriving in '+(cfg('estimateddeliverytime','30-45 min')):'⏱️ Ready for pickup in 20 min';
  $('successBg').classList.add('open');
  
  // Clear pending order
  window._pendingOrder=null;
}

// Store recent order IDs in localStorage
function saveRecentOrderId(oid){
  try{
    var key='sl_recent_orders_'+SHEET_ID;
    var recent=JSON.parse(localStorage.getItem(key)||'[]');
    // Remove duplicate
    recent=recent.filter(function(r){return r.id!==oid});
    // Add to front
    recent.unshift({id:oid,date:new Date().toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})});
    // Keep only last 5
    if(recent.length>5)recent=recent.slice(0,5);
    localStorage.setItem(key,JSON.stringify(recent));
  }catch(e){}
}

function getRecentOrderIds(){
  try{
    var key='sl_recent_orders_'+SHEET_ID;
    return JSON.parse(localStorage.getItem(key)||'[]');
  }catch(e){return[]}
}

function trackOrder(orderId){
  if(!orderId){showTrackInput();return}
  closeSuccess();
  $('trackBg').classList.add('open');
  $('trackBody').innerHTML='<div style="text-align:center;padding:20px"><div class="shimmer" style="width:100px;height:14px;border-radius:4px;margin:8px auto"></div><div class="shimmer" style="width:200px;height:20px;border-radius:4px;margin:8px auto"></div><div style="color:var(--ink3);font-size:12px;margin-top:8px">Looking up order...</div></div>';
  
  // Load Orders tab to find this order
  loadSheet('Orders',function(r){
    if(!r||!r.table||!r.table.rows||!r.table.rows.length){
      $('trackBody').innerHTML='<div style="text-align:center;padding:24px;color:var(--ink3)"><div style="font-size:36px;margin-bottom:8px">🔍</div><strong>Order not found</strong><p style="font-size:12px;margin-top:6px">Check your Order ID and try again</p></div>';
      return;
    }
    
    // Parse — detect if cols have proper labels or if headers are in row 0
    var colLabels=(r.table.cols||[]).map(function(c){return(c.label||'').trim()});
    var firstRaw=colLabels[0]||'';
    var headers=[];
    var dataRows=r.table.rows;
    
    if(firstRaw&&firstRaw.split(/\s+/).length<=3&&colLabels.filter(function(l){return l}).length>1){
      // Normal: cols have proper labels
      headers=colLabels;
    }else{
      // Merged: use row 0 as headers
      var hRow=r.table.rows[0];
      if(hRow&&hRow.c){for(var h=0;h<hRow.c.length;h++){var hc=hRow.c[h];var hv='';if(hc){if(hc.f!=null)hv=String(hc.f).trim();else if(hc.v!=null)hv=String(hc.v).trim()}headers.push(hv)}}
      dataRows=r.table.rows.slice(1);
    }
    
    var order=null;
    for(var i=0;i<dataRows.length;i++){
      var row=dataRows[i];
      var o={};
      headers.forEach(function(hd,j){
        var c=row.c&&row.c[j];
        var v='';
        if(c){if(c.f!=null)v=String(c.f).trim();else if(c.v!=null)v=String(c.v).trim()}
        var key=hd.toLowerCase().replace(/\s+/g,'');
        if(key)o[key]=v;
      });
      var oid=o.orderid||o['orderid']||'';
      if(oid.toLowerCase()===orderId.toLowerCase()){order=o;break}
    }
    
    if(!order){
      $('trackBody').innerHTML='<div style="text-align:center;padding:24px;color:var(--ink3)"><div style="font-size:36px;margin-bottom:8px">🔍</div><strong>Order not found</strong><p style="font-size:12px;margin-top:6px">"'+esc(orderId)+'" was not found. Check your Order ID.</p></div>';
      return;
    }
    
    renderTrackOrder(order,orderId);
    saveRecentOrderId(orderId);
  });
}

function renderTrackOrder(o,orderId){
  var status=(o.status||'new').toLowerCase();
  var name=o.customername||o.name||'';
  var phone=o.phone||'';
  var items=o.items||'';
  var total=o.total||o['total(₹)']||'0';
  var mode=(o.mode||'delivery').toLowerCase();
  var date=o['date&time']||o.date||o['datetime']||'';
  var comment=o.shopkeepercomment||o['shopkeepercomment']||o.comment||'';
  var address=o.address||'';
  var payment=o.payment||'';
  
  // Define timeline steps
  var steps=[
    {key:'new',label:'Order Placed',icon:'📋',sub:date?date:''},
    {key:'confirmed',label:'Confirmed by Restaurant',icon:'✅',sub:'Your food is being prepared'},
    {key:'packed',label:mode==='delivery'?'Packed & Ready':'Ready for Pickup',icon:'📦',sub:mode==='delivery'?'Waiting for delivery partner':'Please pick up from counter'},
    {key:mode==='delivery'?'delivered':'pickedup',label:mode==='delivery'?'Delivered':'Picked Up',icon:mode==='delivery'?'🛵':'🏪',sub:'Enjoy your meal!'}
  ];
  
  var cancelled=(status==='cancelled');
  var currentIdx=0;
  if(status==='confirmed')currentIdx=1;
  else if(status==='packed')currentIdx=2;
  else if(status==='delivered'||status==='picked up'||status==='pickedup'||status==='done'||status==='completed')currentIdx=3;
  
  var html='';
  html+='<div class="track-oid">#'+esc(orderId)+'</div>';
  
  // Timeline
  html+='<div class="track-timeline">';
  steps.forEach(function(step,idx){
    var state='';
    if(cancelled&&idx===0)state='done';
    else if(cancelled&&idx>0)state='';
    else if(idx<currentIdx)state='done';
    else if(idx===currentIdx)state='active';
    
    html+='<div class="track-step '+state+(cancelled&&idx===currentIdx+1?' cancelled':'')+'"><div class="track-dot"></div>';
    html+='<div class="track-step-title">'+step.icon+' '+step.label+'</div>';
    if(step.sub)html+='<div class="track-step-sub">'+esc(step.sub)+'</div>';
    html+='</div>';
  });
  if(cancelled){
    html+='<div class="track-step cancelled"><div class="track-dot"></div>';
    html+='<div class="track-step-title">❌ Order Cancelled</div>';
    html+='<div class="track-step-sub">This order was cancelled</div>';
    html+='</div>';
  }
  html+='</div>';
  
  // Shopkeeper comment
  if(comment){
    html+='<div class="track-comment"><div class="track-comment-label">💬 Message from Restaurant</div>'+esc(comment)+'</div>';
  }
  
  // Order details
  html+='<div class="track-items"><div class="track-items-h">Order Details</div>';
  var itemList=items.split(/[,\n]+/).filter(function(s){return s.trim()});
  itemList.forEach(function(it){
    var parts=it.trim().split('=');
    html+='<div class="track-item"><span class="track-item-name">'+esc(parts[0].trim())+'</span>';
    if(parts[1])html+='<span class="track-item-price">'+esc(parts[1].trim())+'</span>';
    html+='</div>';
  });
  html+='<div class="track-total"><span>Total</span><span>₹'+esc(total)+'</span></div>';
  html+='</div>';
  
  // Delivery info
  if(address)html+='<div style="font-size:12px;color:var(--ink2);margin-bottom:8px">📍 '+esc(address)+'</div>';
  if(mode)html+='<div style="font-size:12px;color:var(--ink3);margin-bottom:8px">'+(mode==='delivery'?'🛵 Delivery':'🏪 Pickup')+(payment?' · 💳 '+esc(payment):'')+'</div>';
  
  // Contact restaurant
  var shopPhone=cfg('phone','');
  var shopWa=cfg('whatsapp','')||shopPhone;
  if(shopPhone||shopWa){
    html+='<div class="track-contact">';
    if(shopPhone)html+='<a href="tel:+'+shopPhone.replace(/\D/g,'')+'">📞 Call Restaurant</a>';
    if(shopWa)html+='<a href="https://wa.me/'+shopWa.replace(/\D/g,'')+'" target="_blank">💬 WhatsApp</a>';
    html+='</div>';
  }
  
  $('trackBody').innerHTML=html;
}

// Scroll to menu (used by hero CTA "Order Now" button)

// Scroll to a specific dish by name (used by Daily Special "Order now")
function scrollToDish(name){
  // Reset filter to All so the dish is definitely visible
  activeCat='All';
  if($('searchInput'))$('searchInput').value='';
  // Update cat nav active state
  document.querySelectorAll('.cat-nav-btn').forEach(function(b){
    b.classList.remove('active');
    if(b.textContent.trim().indexOf('All')===0)b.classList.add('active');
  });
  renderMenu();
  // Wait for DOM update then scroll
  requestAnimationFrame(function(){
    setTimeout(function(){
      var dishes=document.querySelectorAll('.dish');
      var lowerName=String(name||'').toLowerCase().trim();
      var found=null;
      
      // Strategy 1: Exact match (case-insensitive)
      for(var i=0;i<dishes.length;i++){
        var n=dishes[i].querySelector('.dish-name');
        if(n&&n.textContent.toLowerCase().trim()===lowerName){found=dishes[i];break}
      }
      
      // Strategy 2: Substring match
      if(!found){
        for(var i=0;i<dishes.length;i++){
          var n=dishes[i].querySelector('.dish-name');
          if(n&&n.textContent.toLowerCase().indexOf(lowerName)>=0){found=dishes[i];break}
        }
      }
      
      // Strategy 3: Word match — find dish that shares the most distinctive words
      if(!found){
        var words=lowerName.split(/[\s,\-]+/).filter(function(w){
          return w.length>2&&['the','and','with','for','combo','special','only','buy','get'].indexOf(w)<0;
        });
        if(words.length){
          var bestMatch=null,bestScore=0;
          for(var i=0;i<dishes.length;i++){
            var n=dishes[i].querySelector('.dish-name');
            if(!n)continue;
            var dn=n.textContent.toLowerCase();
            var score=0;
            words.forEach(function(w){if(dn.indexOf(w)>=0)score++});
            if(score>bestScore){bestScore=score;bestMatch=dishes[i]}
          }
          if(bestScore>0)found=bestMatch;
        }
      }
      
      if(found){
        var top=found.getBoundingClientRect().top+window.pageYOffset-150;
        window.scrollTo({top:Math.max(0,top),behavior:'smooth'});
        // Highlight
        found.style.transition='box-shadow .3s,background .3s';
        found.style.boxShadow='0 0 0 3px var(--brand)';
        found.style.borderRadius='var(--r)';
        found.style.background='var(--brand-bg)';
        setTimeout(function(){
          found.style.boxShadow='';
          found.style.background='';
          found.style.borderRadius='';
        },3000);
      }else{
        // No match — scroll to menu and show first category
        scrollToMenu();
        showToast('Browse the full menu below');
      }
    },200);
  });
}

// Make cat-nav scrollable with mouse wheel + drag on desktop
(function(){
  var nav=document.getElementById('catNav');
  if(!nav)return;
  // Mouse wheel → horizontal scroll
  nav.addEventListener('wheel',function(e){
    if(Math.abs(e.deltaY)>0){
      e.preventDefault();
      nav.scrollLeft+=e.deltaY;
    }
  },{passive:false});
  // Drag to scroll on desktop
  var isDown=false,startX,scrollL;
  nav.addEventListener('mousedown',function(e){
    isDown=true;nav.style.cursor='grabbing';startX=e.pageX-nav.offsetLeft;scrollL=nav.scrollLeft;
  });
  nav.addEventListener('mouseleave',function(){isDown=false;nav.style.cursor='grab'});
  nav.addEventListener('mouseup',function(){isDown=false;nav.style.cursor='grab'});
  nav.addEventListener('mousemove',function(e){
    if(!isDown)return;e.preventDefault();
    var x=e.pageX-nav.offsetLeft;
    nav.scrollLeft=scrollL-(x-startX);
  });
  nav.style.cursor='grab';
})();
